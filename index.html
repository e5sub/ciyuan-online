<!DOCTYPE html><html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><meta name="referrer" content="no-referrer"><style rel="stylesheet" type="text/css">@charset "utf-8";

* { box-sizing: border-box; margin: 0px; padding: 0px; -webkit-tap-highlight-color: transparent; }

:root { --bg: #06060e; --c1: #0e0e1a; --c2: #161628; --c3: #1e1e38; --border: rgba(255,255,255,0.06); --text: #e8e6f0; --dim: #706e88; --accent: #ff6b35; --accent2: #ff9f1c; --red: #ff4444; --green: #2dd4bf; --gold: #ffd700; --blue: #64b5f6; --purple: #b388ff; --font: 'Noto Sans SC',sans-serif; --title: 'ZCOOL KuaiLe',cursive; }

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 16px; }

#game-wrapper { position: relative; width: 100%; height: 100%; margin: 0 auto; overflow: hidden; }

@media (min-width: 600px) {
  body { display: flex; justify-content: center; align-items: center; background: #020208; }
  #game-wrapper { max-width: 480px; max-height: 100vh; height: 100%; border-left: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.06); background: var(--bg); box-shadow: 0 0 60px rgba(255,107,53,0.08); }
  html { font-size: 18px; }
}
@media (min-width: 900px) {
  #game-wrapper { max-width: 520px; }
  html { font-size: 20px; }
}
@media (min-width: 1200px) {
  #game-wrapper { max-width: 560px; }
  html { font-size: 22px; }
}
@media (min-width: 1600px) {
  #game-wrapper { max-width: 600px; }
  html { font-size: 24px; }
}

button { font-family: var(--font); border: none; outline: none; cursor: pointer; }

img { display: block; }

.screen { position: absolute; inset: 0px; display: none; flex-direction: column; overflow: hidden; }

.screen.active { display: flex; }

@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes starBurst { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
@keyframes awakenBurst { 0% { transform: scale(0.2); opacity: 0; } 30% { transform: scale(1.15); opacity: 1; } 50% { transform: scale(0.95); } 70% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
@keyframes awakenPortrait { 0% { transform: scale(0) rotate(-180deg); box-shadow: 0 0 0 #ff6b35; } 50% { transform: scale(1.3) rotate(10deg); box-shadow: 0 0 60px #ff6b35; } 100% { transform: scale(1) rotate(0deg); box-shadow: 0 0 40px #ff6b35,0 0 80px #ff6b3550; } }
@keyframes awakenRing { 0% { transform: scale(0.5); opacity: 0; border-width: 6px; } 50% { transform: scale(1.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; border-width: 1px; } }
@keyframes awakenGlow { 0% { opacity: 0; transform: translateY(20px); } 40% { opacity: 1; transform: translateY(-5px); } 100% { opacity: 1; transform: translateY(0); } }

@keyframes glowPulse { 
  0%, 100% { box-shadow: rgba(255, 107, 53, 0.3) 0px 0px 8px; }
  50% { box-shadow: rgba(255, 107, 53, 0.7) 0px 0px 22px; }
}

.star-up-badge { position: absolute; top: 2px; right: 2px; background: linear-gradient(135deg, rgb(255, 215, 0), rgb(255, 159, 28)); color: rgb(0, 0, 0); font-size: 0.3rem; font-weight: 900; padding: 1px 4px; border-radius: 6px; animation: 1.5s ease 0s infinite normal none running glowPulse; z-index: 2; }

@keyframes popIn { 
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes hitShake { 
  0%, 100% { transform: translateX(0px); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

@keyframes rageGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.5); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
  50% { transform: scale(1.05); box-shadow: 0 0 12px 4px rgba(255,107,107,0.3); }
}

@keyframes ultFlash { 
  0% { opacity: 0; }
  15% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes ssrShimmer { 
  0% { left: -100%; }
  100% { left: 200%; }
}

@keyframes floatDmg { 
  0% { opacity: 1; transform: translateY(0px) scale(0.8); }
  10% { transform: translateY(-5px) scale(1.4); }
  60% { opacity: 0.9; }
  100% { opacity: 0; transform: translateY(-70px) scale(1); }
}

@keyframes floatHeal { 
  0% { opacity: 1; transform: translateY(0px) scale(0.8); }
  100% { opacity: 0; transform: translateY(-40px) scale(1.1); }
}

@keyframes dashAtk { 
  0% { transform: translate(0px, 0px); }
  40% { transform: translate(var(--dx),var(--dy)); }
  60% { transform: translate(var(--dx),var(--dy)); }
  100% { transform: translate(0px, 0px); }
}

@keyframes skillBurst { 
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(2); opacity: 0.5; }
  100% { transform: scale(3.5); opacity: 0; }
}

@keyframes screenShake { 
  0%, 100% { transform: translate(0px); }
  10% { transform: translate(-6px, 3px); }
  30% { transform: translate(6px, -3px); }
  50% { transform: translate(-4px, 5px); }
  70% { transform: translate(4px, -5px); }
  90% { transform: translate(-2px, 2px); }
}

@keyframes impactRing { 
  0% { transform: scale(0); opacity: 0.9; border-width: 4px; }
  100% { transform: scale(3.5); opacity: 0; border-width: 1px; }
}

@keyframes slashFx { 
  0% { transform: scaleX(0) rotate(-25deg); opacity: 1; }
  50% { transform: scaleX(1) rotate(-25deg); opacity: 0.7; }
  100% { transform: scaleX(1.5) rotate(-25deg); opacity: 0; }
}

@keyframes battleStart { 
  0% { transform: scale(2) rotate(-5deg); opacity: 0; }
  25% { transform: scale(1) rotate(0deg); opacity: 1; }
  75% { opacity: 1; }
  100% { transform: scale(0.8); opacity: 0; }
}

@keyframes skillBannerIn { 
  0% { transform: translateX(-120%) scaleY(0.2); opacity: 0; }
  15% { transform: translateX(0px) scaleY(1); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateX(120%) scaleY(0.2); opacity: 0; }
}

@keyframes ultGlow { 
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
}

@keyframes rageBorder { 
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

@keyframes gachaReveal { 
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.anim-in { animation: 0.3s ease 0s 1 normal none running fadeIn; }

function getPresetTeamForSize(size, rng) {
  var candidates = PRESET_TEAMS.filter(function(t) { return t.members.length <= size && t.members.length >= Math.max(3, size - 1); });
  if (!candidates.length) candidates = PRESET_TEAMS.filter(function(t) { return t.members.length <= size; });
  if (!candidates.length) return null;
  var picked = candidates[Math.floor(rng() * candidates.length)];
  var team = picked.members.slice(0, size);
  // If team is smaller than needed, fill with random chars that don't duplicate
  if (team.length < size) {
    var usedIds = {};
    team.forEach(function(id) { usedIds[id] = true; });
    var fillPool = CHARS.filter(function(c) { return !usedIds[c.id]; });
    while (team.length < size && fillPool.length) {
      var idx = Math.floor(rng() * fillPool.length);
      team.push(fillPool[idx].id);
      fillPool.splice(idx, 1);
    }
  }
  return { name: picked.name, members: team };
}

function equipCost(lv) {
  var tier = Math.floor(lv / 100);
  var base = 100 + lv * 80 + tier * 5000;
  // After rebirth, cost scales: x2 per rebirth tier
  return Math.floor(base * Math.pow(2, tier));
}

// Equipment breakthrough: every 100 levels
const EQUIP_BREAK_COSTS = [
  { gold: 50000, gems: 200 },   // 0→1 (unlock 101-200)
  { gold: 120000, gems: 500 },  // 1→2 (unlock 201-300)
  { gold: 250000, gems: 1000 }, // 2→3 (unlock 301-400)
  { gold: 500000, gems: 2000 }, // 3→4 (unlock 401-500)
  { gold: 1000000, gems: 4000 } // 4→5 (unlock 501-600)
];

function getEquipMaxLv(charId) {
  var r = G.roster[charId];
  if (!r) return 100;
  var brk = r.equipBreak || 0;
  return 100 + brk * 100;
}

function formatEquipLv(eLv) {
  if (eLv <= 100) return 'Lv.' + eLv;
  var t = Math.ceil(eLv / 100) - 1;
  var lv = ((eLv - 1) % 100) + 1;
  return t + '转Lv.' + lv;
}

function formatEquipMax(eqMaxLv) {
  if (eqMaxLv <= 100) return 'Lv.' + eqMaxLv;
  var t = Math.ceil(eqMaxLv / 100) - 1;
  return t + '转Lv.100';
}

function getEquipBreakBonus(brk) {
  return brk * 1.0; // +100% per rebirth
}

function canEquipBreak(charId) {
  var r = G.roster[charId];
  if (!r) return false;
  var brk = r.equipBreak || 0;
  if (brk >= EQUIP_BREAK_COSTS.length) return false;
  var eLv = r.equip['accessory'] || 0;
  var maxLv = 100 + brk * 100;
  if (eLv < maxLv) return false;
  var cost = EQUIP_BREAK_COSTS[brk];
  return G.gold >= cost.gold && G.gems >= cost.gems;
}

function doEquipBreak(charId) {
  var r = G.roster[charId];
  if (!r) return;
  var brk = r.equipBreak || 0;
  if (brk >= EQUIP_BREAK_COSTS.length) return;
  var eLv = r.equip['accessory'] || 0;
  var maxLv = 100 + brk * 100;
  if (eLv < maxLv) return;
  var cost = EQUIP_BREAK_COSTS[brk];
  if (G.gold < cost.gold || G.gems < cost.gems) return;
  G.gold -= cost.gold;
  G.gems -= cost.gems;
  r.equipBreak = brk + 1;
  saveGame();
  gameToast('装备转生', '⚡ 转生第 ' + r.equipBreak + ' 次！\n' + r.equipBreak + '转Lv.1 → ' + r.equipBreak + '转Lv.100\n永久加成 +' + Math.round(getEquipBreakBonus(r.equipBreak) * 100) + '%');
  if (_cdCharId) renderCharDetail(_cdCharId);
  else renderHub('train');
}

function equipBonus(type, lv, breakLevel) {
  const t = EQUIP_TYPES.find(e => e.id === type)
  var brk = breakLevel || 0;
  var breakMult = 1 + brk * 1.0; // +100% per rebirth
  var lvMult = brk > 0 ? 2 : 1; // Double base stat growth after rebirth
  const b = {atk:0, def:0, hp:0, spd:0}
  b[t.stat] = Math.floor(t.mult * lvMult * lv * breakMult)
  if (t.stat2) b[t.stat2] = Math.floor(t.mult2 * lvMult * lv * breakMult)
  if (t.stat3) b[t.stat3] = Math.floor(t.mult3 * lvMult * lv * breakMult)
  if (t.stat4) b[t.stat4] = Math.floor(t.mult4 * lvMult * lv * breakMult)
  return b
}

// --- EXP SYSTEM ---
function expToLevel(lv) {
  var base = Math.floor(80 + lv * lv * 8 + lv * 40);
  var rebirthScale = 1 + (G.rebirth || 0) * 0.5;
  return Math.floor(base * rebirthScale);
}

function addTeamExp(amt) {
  G.teamExp += amt;
  while (G.teamExp >= expToLevel(G.teamLv) && G.teamLv < 100) {
    G.teamExp -= expToLevel(G.teamLv);
    G.teamLv++;
  }
  if (G.teamLv >= 100) {
    G.teamLv = 100;
    G.teamExp = 0;
  }
}

function canRebirth() {
  return G.teamLv >= 100 && (G.rebirth || 0) < 5;
}

function formatTeamLv() {
  if ((G.rebirth || 0) > 0) return G.rebirth + '转Lv.' + G.teamLv;
  return 'Lv.' + G.teamLv;
}

function doRebirth() {
  if (!canRebirth()) return;
  G.rebirth = (G.rebirth || 0) + 1;
  G.teamLv = 1;
  G.teamExp = 0;
  saveGame();
  gameToast('转生突破', '🌟 转生第 ' + G.rebirth + ' 次！(最高5转)\n属性倍率 ×' + (1 + G.rebirth * 0.3).toFixed(1) + '\n等级重置为 Lv.1，经验需求提升');
  setTimeout(function() { renderHub('train'); }, 50);
}

async function loadLeaderboard(serverId, type) {
  if (!ONLINE.token) return;
  ONLINE.leaderboardLoading = true;
  ONLINE.leaderboardServerId = Number(serverId || 0);
  ONLINE.leaderboardType = type || ONLINE.leaderboardType || 'power';
  try {
    var params = [];
    if (ONLINE.leaderboardServerId) params.push('serverId=' + ONLINE.leaderboardServerId);
    if (ONLINE.leaderboardType) params.push('type=' + encodeURIComponent(ONLINE.leaderboardType));
    var qs = params.length ? ('?' + params.join('&')) : '';
    var data = await onlineApi('/api/leaderboard' + qs);
    ONLINE.leaderboard = data.rankings || [];
    ONLINE.leaderboardType = data.type || ONLINE.leaderboardType;
    if (document.getElementById('hub') && document.querySelector('.hub-tab.active')) {
      var active = document.querySelector('.hub-tab.active');
      if (active && active.textContent.indexOf('排行') >= 0) renderHub('leaderboard');
    }
  } catch (e) {
    ONLINE.leaderboard = [];
  } finally {
    ONLINE.leaderboardLoading = false;
  }
}

async function loadArenaOpponents(force) {
  if (!ONLINE.token || !ONLINE.selectedRoleId) return [];
  if (!force && ONLINE.arenaOpponents && ONLINE.arenaOpponents.length) return ONLINE.arenaOpponents;
  ONLINE.arenaOpponentsLoading = true;
  try {
    var data = await onlineApi('/api/arena/opponents?limit=3');
    ONLINE.arenaOpponents = data.opponents || [];
  } catch (e) {
    ONLINE.arenaOpponents = [];
  } finally {
    ONLINE.arenaOpponentsLoading = false;
  }
  return ONLINE.arenaOpponents;
}

async function onlineApi(path, options) {
  options = options || {};
  var headers = {'Content-Type':'application/json'};
  if (options.headers) for (var key in options.headers) headers[key] = options.headers[key];
  if (ONLINE.token) headers.Authorization = 'Bearer ' + ONLINE.token;
  if (ONLINE.selectedRoleId) headers['X-Role-Id'] = String(ONLINE.selectedRoleId);
  var res = await fetch(path, {
    method: options.method || 'GET',
    headers: headers,
    body: options.body || undefined
  });
  var data = {};
  try { data = await res.json(); } catch(e) {}
  if (data && data.message) data.message = translateMessage(data.message);
  if (!res.ok) throw new Error(data.message || '请求失败');
  return data;
}

async function fetchOnlineProfile() {
  if (!ONLINE.token) { ONLINE.profile = null; return null; }
  try {
    ONLINE.profile = await onlineApi('/api/auth/me');
    ONLINE.leaderboard = null;
    ONLINE.arenaOpponents = null;
    if (ONLINE.selectedRoleId) {
      var role = getSelectedRole();
      if (!role) {
        ONLINE.selectedRoleId = 0;
        try { localStorage.removeItem('dcg_role_id'); } catch(err) {}
      }
    }
    setTimeout(primeLeaderboardCaches, 0);
    return ONLINE.profile;
  } catch (e) {
    ONLINE.token = '';
    ONLINE.profile = null;
    ONLINE.selectedRoleId = 0;
    ONLINE.leaderboard = null;
    ONLINE.arenaOpponents = null;
    try { localStorage.removeItem('dcg_token'); } catch(err) {}
    try { localStorage.removeItem('dcg_role_id'); } catch(err) {}
    return null;
  }
}

async function submitRegister() {
  try {
    var accountName = (document.getElementById('auth-register-account').value || '').trim();
    var password = document.getElementById('auth-register-password').value || '';
    var confirmPassword = document.getElementById('auth-register-confirm').value || '';
    if (password !== confirmPassword) throw new Error('两次输入的密码不一致');
    var data = await onlineApi('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({ accountName: accountName, password: password })
    });
    switchAuthTab('login');
    document.getElementById('auth-login-account').value = accountName;
    setAuthMessage('success', data.message || '注册成功');
  } catch (e) {
    setAuthMessage('error', e.message);
  }
}

async function submitLogin() {
  try {
    var accountName = (document.getElementById('auth-login-account').value || '').trim();
    var password = document.getElementById('auth-login-password').value || '';
    var data = await onlineApi('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ accountName: accountName, password: password })
    });
    ONLINE.token = data.token;
    try { localStorage.setItem('dcg_token', ONLINE.token); } catch(e) {}
    await fetchOnlineProfile();
    closeAuthModal();
    updateTitleAuthStatus();
    showRoleModal();
  } catch (e) {
    setAuthMessage('error', e.message);
  }
}

async function flushOnlineSave() {
  if (!ONLINE.token || !ONLINE.selectedRoleId) return;
  if (ONLINE.saveInFlight) {
    ONLINE.pendingSave = true;
    return;
  }
  ONLINE.saveInFlight = true;
  try {
    await onlineApi('/api/game/save', {
      method: 'PUT',

    });

      queueOnlineSave();
    }
  }
}

// --- SAVE EXPORT/IMPORT (Compact + Compressed + Clipboard) ---
var _SAVE_KEY = 'DimensionBrawl2026';
function xorEncrypt(str, key) {
  var out = [];
  for (var i = 0; i < str.length; i++) {
    out.push(String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length)));
  }
  return out.join('');
}

// Compact save: strip defaults, short keys
function compactSave() {
  var c = {};
  // roster: {id: [star, frags, wep, arm, acc, break]}
  var r = {};
  for (var id in G.roster) {
    var e = G.roster[id];
    r[id] = [e.star||0, e.frags||0, (e.equip&&e.equip.weapon)||0, (e.equip&&e.equip.armor)||0, (e.equip&&e.equip.accessory)||0, e.equipBreak||0];
  }
  c.r = r;
  c.f = G.formation;
  c.g = G.gold||0;
  c.d = G.gems||0;
  c.l = G.teamLv||1;
  c.x = G.teamExp||0;
  c.p = G.pity||0;
  c.pn = G.pityNoSSR||0;
  c.s = G.stage||1;
  c.rb = G.rebirth||0;
  c.bs = G.battleSpeed||1;
  c.an = G.autoNext?1:0;
  c.w = G.wins||0;
  c.lo = G.losses||0;
  // arena compact
  var a = G.arena||{};
  c.ar = [a.points||0, a.wins||0, a.losses||0, a.dailyBattles||0, a.season||0, a.seasonEnd||0, a.dailyClaimed||0, a.dailyBattleDate||0, JSON.stringify(a.milestonesClaimed||[])];
  // boss compact
  var b = G.boss||{};
  c.bo = [b.bestDmg||0, b.todayAttempts||0, b.lastSettleTime||0, b.todayDate||0, b.totalRewards||0];
  // idle
  c.il = (G.idle&&G.idle.lastCollect)||0;
  return JSON.stringify(c);
}

// Expand compact save back to full G format
function expandSave(compact) {
  var c = JSON.parse(compact);
  var data = {
    roster: {},
    formation: c.f||[null,null,null,null,null,null],
    gold: c.g||0,
    gems: c.d||0,
    teamLv: c.l||1,
    teamExp: c.x||0,
    pity: c.p||0,
    pityNoSSR: c.pn||0,
    stage: c.s||1,
    rebirth: c.rb||0,
    battleSpeed: c.bs||1,
    autoNext: !!c.an,
    wins: c.w||0,
    losses: c.lo||0,
    arena: { points:(c.ar&&c.ar[0])||0, season:(c.ar&&c.ar[4])||0, seasonEnd:(c.ar&&c.ar[5])||0, dailyClaimed:(c.ar&&c.ar[6])||0, wins:(c.ar&&c.ar[1])||0, losses:(c.ar&&c.ar[2])||0, dailyBattles:(c.ar&&c.ar[3])||0, dailyBattleDate:(c.ar&&c.ar[7])||0, milestonesClaimed:(c.ar&&c.ar[8])?JSON.parse(c.ar[8]):[] },
    boss: { bestDmg:(c.bo&&c.bo[0])||0, lastSettleTime:(c.bo&&c.bo[2])||Date.now(), todayAttempts:(c.bo&&c.bo[1])||0, todayDate:(c.bo&&c.bo[3])||0, totalRewards:(c.bo&&c.bo[4])||0 },
    idle: { lastCollect: c.il||Date.now() }
  };
  for (var id in c.r) {
    var a = c.r[id];
    data.roster[id] = { star:a[0]||0, frags:a[1]||0, equip:{weapon:a[2]||0, armor:a[3]||0, accessory:a[4]||0}, equipBreak:a[5]||0 };
  }
  return data;
}

// Deflate compress (native browser API)
async function deflateCompress(str) {
  var blob = new Blob([str]);
  var cs = new CompressionStream('deflate');
  var stream = blob.stream().pipeThrough(cs);
  var buf = await new Response(stream).arrayBuffer();
  var bytes = new Uint8Array(buf);
  var binary = '';
  for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}
async function deflateDecompress(b64) {
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  var blob = new Blob([bytes]);
  var ds = new DecompressionStream('deflate');
  var stream = blob.stream().pipeThrough(ds);
  var text = await new Response(stream).text();
  return text;
}

// Export: compact → compress → encrypt → copy
async function exportSave() {
  try {
    var compact = compactSave();
    var code;
    // Try native compression
    if (typeof CompressionStream !== 'undefined') {
      var compressed = await deflateCompress(compact);
      var encrypted = xorEncrypt(compressed, _SAVE_KEY);
      code = 'D2|' + btoa(unescape(encodeURIComponent(encrypted)));
    } else {
      // Fallback: no compression, just compact + encrypt
      var encrypted = xorEncrypt(compact, _SAVE_KEY);
      code = 'D1|' + btoa(unescape(encodeURIComponent(encrypted)));
    }
    // Copy to clipboard
    var copied = false;
    try {
      var ta = document.createElement('textarea');
      ta.value = code; document.body.appendChild(ta); ta.select();
      copied = document.execCommand('copy'); document.body.removeChild(ta);
    } catch(e) {}
    if (!copied) { try { await navigator.clipboard.writeText(code); copied = true; } catch(e) {} }
    if (copied) gameToast('导出成功', '存档已复制到剪贴板\n\n长度: ' + code.length + ' 字符');
    else gameToast('导出', '请手动复制:\n\n<span style="font-size:0.35rem;word-break:break-all;user-select:all;color:#2dd4bf">' + code + '</span>');
  } catch(e) { gameToast('导出失败', '错误: ' + e.message); }
}

// Import: paste → decrypt → decompress → expand → restore
async function importSave() {
  var overlay = document.createElement('div');
  overlay.className = 'game-toast-overlay';
  var box = document.createElement('div');
  box.className = 'game-toast';
  box.innerHTML =
    '<div class="game-toast-title">导入存档</div>' +
    '<div class="game-toast-body">粘贴存档代码 (每日3次):</div>' +
    '<textarea id="import-ta" style="width:100%;height:60px;margin:0.3rem 0;background:var(--c2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.3rem;font-size:0.38rem;resize:none" placeholder="粘贴 D2|... 或 D1|... 存档码"></textarea>' +
    '<div style="display:flex;gap:0.5rem;justify-content:center">' +
    '<button class="game-toast-btn" onclick="doImportSave()">确认导入</button>' +
    '<button class="game-toast-btn" style="background:var(--c3);color:var(--dim)" onclick="this.closest(\'.game-toast\').remove();document.querySelector(\'.game-toast-overlay\').remove()">取消</button>' +
    '</div>';
  document.body.appendChild(overlay);
  document.body.appendChild(box);
  overlay.onclick = function() { box.remove(); overlay.remove(); };
}
async function doImportSave() {
  try {
    // Daily import limit: 3 times per day
    var today = new Date().toISOString().slice(0,10);
    if (!G.importDate || G.importDate !== today) { G.importDate = today; G.importCount = 0; }
    if (G.importCount >= 3) {
      gameToast('导入限制', '每日最多导入3次存档，明天再试');
      return;
    }
    var ta = document.getElementById('import-ta');
    var code = (ta ? ta.value : '').trim();
    var compact;
    if (code.startsWith('D2|')) {
      // Compressed format
      var encrypted = decodeURIComponent(escape(atob(code.substring(3))));
      var compressed = xorEncrypt(encrypted, _SAVE_KEY);
      compact = await deflateDecompress(compressed);
    } else if (code.startsWith('D1|')) {
      // Compact but uncompressed
      var encrypted = decodeURIComponent(escape(atob(code.substring(3))));
      compact = xorEncrypt(encrypted, _SAVE_KEY);
    } else if (code.startsWith('DCG1|')) {
      // Legacy full format
      var encrypted = decodeURIComponent(escape(atob(code.substring(5))));
      var json = xorEncrypt(encrypted, _SAVE_KEY);
      var data = JSON.parse(json);
      if (!data.roster || !data.formation) { gameToast('导入失败', '存档数据不完整'); return; }
      G.importCount = (G.importCount||0) + 1; G.importDate = today;
      Object.assign(G, data);
      fixImportTimestamps();
      saveGame();
      document.querySelector('.game-toast').remove();
      document.querySelector('.game-toast-overlay').remove();
      gameToast('导入成功', '存档已恢复（今日剩余' + (3-G.importCount) + '次），即将刷新...');
      setTimeout(function() { location.reload(); }, 1200);
      return;
    } else {
      gameToast('导入失败', '无效格式，需以 D2| 或 D1| 开头'); return;
    }
    var data = expandSave(compact);
    if (!data.roster || !data.formation) { gameToast('导入失败', '存档数据不完整'); return; }
    G.importCount = (G.importCount||0) + 1; G.importDate = today;
    Object.assign(G, data);
    fixImportTimestamps();
    saveGame();
    document.querySelector('.game-toast').remove();
    document.querySelector('.game-toast-overlay').remove();
    gameToast('导入成功', '存档已恢复（今日剩余' + (3-G.importCount) + '次），即将刷新...');
    setTimeout(function() { location.reload(); }, 1200);
  } catch(e) { gameToast('导入失败', '解析错误: ' + e.message); }
}

// Prevent immediate boss settlement and arena season reset after importing a save
function fixImportTimestamps() {
  var now = Date.now();
  // Boss: set lastSettleTime to current period boundary so checkBossSettle won't trigger
  if (G.boss) {
    var d = new Date(now);
    var h = d.getHours();
    var boundary = new Date(d);
    boundary.setMinutes(0, 0, 0);
    boundary.setHours(h >= 12 ? 12 : 0);
    G.boss.lastSettleTime = boundary.getTime();
  }
  // Arena: if seasonEnd is in the past, extend to next Monday without resetting points/data
  if (G.arena && G.arena.seasonEnd && now >= G.arena.seasonEnd) {
    G.arena.seasonEnd = getNextMondayMidnight();
  }
}

function newRosterEntry() {
  return { star:0, frags:0, equip:{weapon:0, armor:0, accessory:0}, equipBreak:0 };
}

function initNewPlayer() {
  // Give 3 starter characters: naruto(SSR), yasuo(SR), mikoto(SR)
  const starters = ['naruto','yasuo','mikoto'];
  for (const id of starters) {
    G.roster[id] = newRosterEntry();
  }
  // Auto-place in formation: naruto front, yasuo+mikoto back
  G.formation = ['naruto', null, 'yasuo', 'mikoto', null];
  G.gold = 800;
  G.gems = 1000;
  G.pity = 0;
  G.pityNoSSR = 0;
  G.teamLv = 1;
  G.teamExp = 0;
  G.arena = { points: 0, season: 0, seasonEnd: 0, dailyClaimed: 0, wins: 0, losses: 0, dailyBattles: 0, dailyBattleDate: 0, milestonesClaimed: [] };
  G.boss = { bestDmg: 0, lastSettleTime: 0, todayAttempts: 0, todayDate: 0, totalRewards: 0 };
  G.idle = { lastCollect: Date.now() };
  saveGame();
}

function applySaveMigrations() {
  // If no characters, init new player
  if (!G.roster || Object.keys(G.roster).length === 0) {
    initNewPlayer();
  }
  if (!G.arena) G.arena = { points: 0, season: 0, seasonEnd: 0, dailyClaimed: 0, wins: 0, losses: 0, dailyBattles: 0, dailyBattleDate: 0, milestonesClaimed: [] };
  if (!G.boss) G.boss = { bestDmg: 0, lastSettleTime: 0, todayAttempts: 0, todayDate: 0, totalRewards: 0 };
  if (!G.idle) G.idle = { lastCollect: 0 };
  if (!G.idle.lastCollect) G.idle.lastCollect = Date.now();
  if (G.arena && G.arena.opponents) {
    delete G.arena.opponents;
    G.arena.wins = G.arena.wins || 0;
    G.arena.losses = G.arena.losses || 0;
  }
  if (!G.arena.dailyBattles) G.arena.dailyBattles = 0;
  if (!G.arena.dailyBattleDate) G.arena.dailyBattleDate = 0;
  if (!G.arena.milestonesClaimed) G.arena.milestonesClaimed = [];
  if (!G.teamLv) G.teamLv = 1;
  if (!G.teamExp) G.teamExp = 0;
  if (G.pityNoSSR === undefined || G.pityNoSSR === null) G.pityNoSSR = 0;
  if (!G.rebirth) G.rebirth = 0;
  // Clean up stale battle flags (should never persist in save)
  delete G._fromArena;
  delete G._fromBoss;
  delete G._arenaOpp;
  // Migrate formation from 5 to 6 slots
  if (G.formation && G.formation.length < 6) {
    while (G.formation.length < 6) G.formation.push(null);
  }
  // One-time reset: force refresh boss attempts for 12h period system
  if (G.boss && !G.boss._periodReset) {
    G.boss.todayAttempts = 0;
    G.boss._periodReset = true;
  }
}

async function loadGame() {
  G = createBaseGameState();
  try {
    var s = localStorage.getItem(getLocalSaveKey());
    if (s) { Object.assign(G, JSON.parse(s)); }
  } catch(e) {}
  if (ONLINE.token && ONLINE.selectedRoleId) {
    try {
      var remote = await onlineApi('/api/game/save');
      if (remote && remote.saveData) {
        Object.assign(G, remote.saveData);
        try { localStorage.setItem(getLocalSaveKey(), JSON.stringify(remote.saveData)); } catch(err) {}
      } else {
        initNewPlayer();
      }
    } catch (e) {
      console.warn('load remote save failed:', e.message);
    }
  }
  applySaveMigrations();
}

    return;

// --- Collection/Codex Bonus ---
function getCodexBonus() {
  var ownedCount = 0;
  var totalStars = 0;
  var rarityCount = {SR:0, SS:0, SSR:0};
  for (var id in G.roster) {
    ownedCount++;
    var star = G.roster[id].star || 0;
    totalStars += star;
    var ch = CHARS.find(function(c){ return c.id === id; });
    if (ch && rarityCount[ch.rarity] !== undefined) rarityCount[ch.rarity]++;
  }
  // Per char owned: +0.3% all stats; per star: +0.05%; SS bonus: +0.15% each; SSR bonus: +0.35% each (cap 50%)
  var pct = ownedCount * 0.003 + totalStars * 0.0005 + rarityCount.SS * 0.0015 + rarityCount.SSR * 0.0035;
  pct = Math.min(pct, 0.5); // Cap at 50%
  return { pct: pct, owned: ownedCount, totalStars: totalStars, rarityCount: rarityCount };
}

function getCharStats(charId) {
  const c = CHARS.find(ch => ch.id === charId)
  const r = G.roster[charId]
  if (!c || !r) return null
  const lvMult = 1 + (G.teamLv - 1) * 0.06
  const sMult = starStatMult(r.star)
  const rebirthMult = 1 + (G.rebirth || 0) * 0.3
  const codex = getCodexBonus();
  const codexMult = 1 + codex.pct;
  const eb = {atk:0, def:0, hp:0, spd:0}
  for (const eq of EQUIP_TYPES) {
    const b = equipBonus(eq.id, r.equip[eq.id], r.equipBreak || 0)
    for (const k in b) eb[k] += b[k]
  }
  // Job passive bonuses
  const jobBonus = {hp:0, atk:0, def:0, spd:0};
  const job = c.job || '输出';
  const baseHp = c.hp * HP_SCALE * lvMult * sMult * rebirthMult;
  const baseAtk = c.atk * lvMult * sMult * rebirthMult;
  const baseDef = c.def * lvMult * sMult * rebirthMult;
  const baseSpd = c.spd * lvMult * sMult * rebirthMult;
  if (job === '坦克') { jobBonus.hp = baseHp * 0.15; jobBonus.def = baseDef * 0.20; }
  else if (job === '战士') { jobBonus.atk = baseAtk * 0.15; jobBonus.spd = baseSpd * 0.10; }
  else if (job === '法师') { jobBonus.atk = baseAtk * 0.15; }
  else if (job === '刺客') { jobBonus.atk = baseAtk * 0.10; jobBonus.spd = baseSpd * 0.15; }
  else if (job === '辅助') { jobBonus.hp = baseHp * 0.10; jobBonus.atk = baseAtk * 0.10; jobBonus.def = baseDef * 0.10; jobBonus.spd = baseSpd * 0.10; }
  return {
    hp: Math.floor((baseHp + eb.hp + jobBonus.hp) * codexMult),
    atk: Math.floor((baseAtk + eb.atk + jobBonus.atk) * codexMult),
    def: Math.floor((baseDef + eb.def + jobBonus.def) * codexMult),
    spd: Math.floor((baseSpd + eb.spd + jobBonus.spd) * codexMult)
  }
}

function getActiveSkill(charId) {

function doEquipEnhance(charId, slot) {
  var r = G.roster[charId];
  if (!r) return;
  var eLv = r.equip[slot];
  var cost = equipCost(eLv);
  if (G.gold < cost) return;
  var eqMax = getEquipMaxLv(charId);
  if (eLv >= eqMax) return;
  G.gold -= cost;
  r.equip[slot]++;
  saveGame();
  if (_cdCharId) renderCharDetail(_cdCharId);
  else renderHub('train');
}
function doEquipEnhance10(charId, slot) {
  var r = G.roster[charId];
  if (!r) return;
  var eqMax = getEquipMaxLv(charId);
  var upgraded = 0;
  for (var i = 0; i < 10; i++) {
    var eLv = r.equip[slot];
    if (eLv >= eqMax) break;
    var cost = equipCost(eLv);
    if (G.gold < cost) break;
    G.gold -= cost;
    r.equip[slot]++;
    upgraded++;
  }
  if (upgraded > 0) {
    saveGame();
    if (_cdCharId) renderCharDetail(_cdCharId);
    else renderHub('train');
  }
}

function doStarUp(charId) {
  var r = G.roster[charId];
  if (!r) return;
  if (r.star >= 7) return;
  var req = starFragsNeeded(r.star);
  if (r.frags < req) return;
  r.frags -= req;
  r.star++;
  saveGame();
  if (r.star === 7) {
    showAwakenEffect(charId);
  }
  if (_cdCharId) renderCharDetail(_cdCharId);
  else renderHub('train');
}

function renderCDStats(c, r, stats) {
  const maxExp = expToLevel(G.teamLv);
  const expPct = Math.min((G.teamExp / maxExp) * 100, 100);
  const eb = {atk:0, def:0, hp:0, spd:0};
  for (const eq of EQUIP_TYPES) {
    const b = equipBonus(eq.id, r.equip[eq.id], r.equipBreak || 0);
    for (const k in b) eb[k] += b[k];
  }
  const bars = [
    {label:'血量', val:stats.hp, base:stats.hp - eb.hp, bonus:eb.hp, max:20000, color:'#10b981'},
    {label:'攻击', val:stats.atk, base:stats.atk - eb.atk, bonus:eb.atk, max:2000, color:'#ef4444'},
    {label:'防御', val:stats.def, base:stats.def - eb.def, bonus:eb.def, max:2000, color:'#3b82f6'},
    {label:'速度', val:stats.spd, base:stats.spd - eb.spd, bonus:eb.spd, max:2000, color:'#f59e0b'}
  ];
  let html = `<div style="font-size:0.75rem;font-weight:700;margin-bottom:0.3rem">${formatTeamLv()}${G.rebirth ? ' <span style="color:#ff6b6b;font-size:0.5rem">(属性×' + (1 + G.rebirth * 0.3).toFixed(1) + ')</span>' : ''}</div>`;
  html += `<div class="cd-exp-row"><div style="font-size:0.55rem;color:var(--dim);margin-bottom:2px">EXP: ${G.teamExp}/${maxExp}</div><div class="cd-exp-bar"><div class="cd-exp-fill" style="width:${expPct}%"></div></div></div>`;
  for (const s of bars) {
    const pct = Math.min((s.val / s.max) * 100, 100);
    html += `<div class="cd-stat-row">
      <span class="cd-stat-label">${s.label}</span>
      <div class="cd-stat-bar"><div class="cd-stat-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <span class="cd-stat-val">${s.val}</span>
    </div>`;
    if (s.bonus > 0) {
      html += `<div style="font-size:0.5rem;color:var(--green);margin-left:48px;margin-top:-4px;margin-bottom:4px">基础 ${s.base} + 装备 ${s.bonus}</div>`;
    }
  }
  return html;
}

    const curMult = starStatMult(r.star);
    const nextMult = starStatMult(r.star + 1);
    const lvMult = 1 + (G.teamLv - 1) * 0.06;
    const nextHp = Math.floor(c.hp * lvMult * nextMult);
    const nextAtk = Math.floor(c.atk * lvMult * nextMult);
    const nextDef = Math.floor(c.def * lvMult * nextMult);
    const nextSpd = Math.floor(c.spd * lvMult * nextMult);
    const curHp = Math.floor(c.hp * lvMult * curMult);
    const curAtk = Math.floor(c.atk * lvMult * curMult);
    const curDef = Math.floor(c.def * lvMult * curMult);
    const curSpd = Math.floor(c.spd * lvMult * curMult);

    previewHtml = `<div class="cd-star-preview">
      \u5347\u661F\u540E\u5C5E\u6027\u9884\u89C8:<br>
      HP: ${curHp} \u2192 ${nextHp}<br>
      ATK: ${curAtk} \u2192 ${nextAtk}<br>

    <div class="cd-star-display">${starsStr(r.star)}</div>

      <div style="font-size:0.7rem;font-weight:700;margin-top:4px">${c.name}</div>
    </div>
    <div style="font-size:0.7rem;color:var(--dim)">\u788E\u7247: ${r.frags} / ${fragReq}</div>
    <button class="cd-star-btn" ${canStar ? '' : 'disabled'} onclick="doStarUp('${c.id}')">\u5347\u661F</button>
    ${awakeInfo}

function renderCDSkill(c, r) {
  function skillTypeLabel(type) {
    const map = {dmg:'\u4F24\u5BB3', buff:'\u589E\u76CA', shield:'\u62A4\u76FE', heal:'\u6CBB\u7597', dmg_buff:'\u4F24\u5BB3\u00B7\u589E\u76CA'};
    return map[type] || type;
  }
  function targetLabel(skill) {
    return skill.aoe ? '\u7FA4\u4F53' : '\u5355\u4F53';
  }
  function skillTag(skill) {
    return '[' + skillTypeLabel(skill.type) + '\u00B7' + targetLabel(skill) + ']';
  }
  function skillDetails(skill, isUlt) {
    var details = [];
    if (skill.mult > 0) details.push('<span style="color:#f87171">伤害倍率: ' + Math.round(skill.mult * 100) + '%</span>');
    if (skill.type === 'shield') {
      var baseAmt = (skill.extra && skill.extra.amt) ? skill.extra.amt : 0;
      var hpPct = isUlt ? '10%' : '5%';
      details.push('<span style="color:#60a5fa">护盾: ' + (baseAmt > 0 ? baseAmt + ' + ' : '') + '最大生命' + hpPct + '</span>');
    }
    if (skill.type === 'heal' && skill.extra && skill.extra.amt) {
      var healAtkPct = isUlt ? '15%' : '10%';
      details.push('<span style="color:#34d399">治疗量: 攻击力' + healAtkPct + ' + ' + skill.extra.amt + '</span>');
    }
    if (skill.extra) {
      if (skill.extra.shield) details.push('<span style="color:#60a5fa">附加护盾: ' + skill.extra.shield + ' + 最大生命5%</span>');
      if (skill.extra.heal && typeof skill.extra.heal === 'number') details.push('<span style="color:#34d399">附加治疗: 攻击力10% + ' + skill.extra.heal + '</span>');
      else if (skill.extra.heal === true) details.push('<span style="color:#34d399">附加治疗: 攻击力15% + 2000</span>');
      if (skill.extra.stat && skill.extra.pct) {
        var statName = skill.extra.stat === 'all' ? '全属性' : skill.extra.stat === 'atk' ? '攻击' : skill.extra.stat === 'def' ? '防御' : skill.extra.stat === 'spd' ? '速度' : skill.extra.stat;
        details.push('<span style="color:#fbbf24">' + statName + ' +' + Math.round(skill.extra.pct * 100) + '%</span>');
      }
      if (skill.extra.stat2 && skill.extra.pct2) {
        var statName2 = skill.extra.stat2 === 'spd' ? '速度' : skill.extra.stat2 === 'atk' ? '攻击' : skill.extra.stat2 === 'def' ? '防御' : skill.extra.stat2;
        details.push('<span style="color:#fbbf24">' + statName2 + ' +' + Math.round(skill.extra.pct2 * 100) + '%</span>');
      }
      if (skill.extra.turns) details.push('<span style="color:#a78bfa">持续 ' + skill.extra.turns + ' 回合</span>');
      if (skill.extra.debuff) {
        var debuffName = {burn:'灼烧',freeze:'冰冻',petrify:'石化',stun:'眩晕',poison:'中毒',silence:'沉默',nullify:'虚无',defDown:'降防',atkDown:'降攻',slow:'减速',bleed:'流血',curse:'诅咒',weaken:'虚弱',blind:'致盲',spdDown:'减速',healBlock:'禁疗',paralyze:'麻痹',knockup:'击飞'}[skill.extra.debuff] || skill.extra.debuff;
        details.push('<span style="color:#fb923c">' + debuffName + (skill.extra.debuffRate ? ' ' + Math.round(skill.extra.debuffRate * 100) + '%' : '') + '</span>');
      }
      if (skill.extra.revive) details.push('<span style="color:#f0abfc">复活倒下队友</span>');
      if (skill.extra.cleanse) details.push('<span style="color:#67e8f9">净化异常状态</span>');
      if (skill.extra.counter) details.push('<span style="color:#fb7185">获得反击</span>');
      if (skill.extra.hpAdd) details.push('<span style="color:#34d399">最大生命 +' + skill.extra.hpAdd + '</span>');
      if (skill.extra.dodgeBonus) details.push('<span style="color:#a78bfa">闪避 +' + Math.round(skill.extra.dodgeBonus * 100) + '%</span>');
      if (skill.extra.penetration) details.push('<span style="color:#f87171">穿透 +' + Math.round(skill.extra.penetration * 100) + '%</span>');
      if (skill.extra.critRate) details.push('<span style="color:#fbbf24">暴击率 +' + Math.round(skill.extra.critRate * 100) + '%</span>');
      if (skill.extra.critDmg) details.push('<span style="color:#fbbf24">暴击伤害 +' + Math.round(skill.extra.critDmg * 100) + '%</span>');
      if (skill.extra.drain) details.push('<span style="color:#f0abfc">吸血 ' + Math.round(skill.extra.drain * 100) + '%</span>');
      if (skill.extra.selfHeal) details.push('<span style="color:#34d399">自身回复 ' + skill.extra.selfHeal + '</span>');
      if (skill.extra.taunt) details.push('<span style="color:#60a5fa">嘲讽 ' + skill.extra.taunt + ' 回合</span>');
      if (skill.extra.dmgReduce) details.push('<span style="color:#60a5fa">减伤 ' + Math.round(skill.extra.dmgReduce * 100) + '%</span>');
      if (skill.extra.lifesteal) details.push('<span style="color:#f0abfc">生命窃取 ' + Math.round(skill.extra.lifesteal * 100) + '%</span>');
      if (skill.extra.reflect) details.push('<span style="color:#fb7185">反弹 ' + Math.round(skill.extra.reflect * 100) + '%</span>');
      if (skill.extra.critBonus) details.push('<span style="color:#fbbf24">暴击加成 +' + Math.round(skill.extra.critBonus * 100) + '%</span>');
      if (skill.extra.ignoreDef) details.push('<span style="color:#f87171">无视防御' + (typeof skill.extra.ignoreDef === 'number' ? ' ' + Math.round(skill.extra.ignoreDef * 100) + '%' : '') + '</span>');
      if (skill.extra.defDown) details.push('<span style="color:#fb923c">降低防御</span>');
      if (skill.extra.debuffValue) details.push('<span style="color:#fb923c">效果值: ' + Math.round(skill.extra.debuffValue * 100) + '%</span>');
      if (skill.extra.purify) details.push('<span style="color:#67e8f9">净化</span>');
      if (skill.extra.vsDark) details.push('<span style="color:#fbbf24">对暗属性 +' + skill.extra.vsDark + '</span>');
    }
    if (details.length === 0) return '';
    return '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">' + details.map(function(d) { return '<span style="font-size:0.38rem;padding:1px 6px;background:rgba(255,255,255,0.05);border-radius:4px;border:1px solid rgba(255,255,255,0.08)">' + d + '</span>'; }).join('') + '</div>';
  }
  const cStats = getCharStats(c.id);
  let html = '';
  // Normal skill
  const sk = c.skill;
  let skExtra = skillDetails(sk, false);
  html += `<div class="cd-skill-card">
    <span class="cd-skill-name">${sk.name}</span><span class="cd-skill-type">${skillTag(sk)}</span>
    <div class="cd-skill-desc">${sk.desc}</div>
    ${skExtra}
  </div>`;
  // Ultimate
  const ult = c.ult;
  let ultExtra = skillDetails(ult, true);
  html += `<div class="cd-skill-card">
    <span class="cd-skill-name">${ult.name}</span><span class="cd-skill-type">${skillTag(ult)} \u5965\u4E49</span>
    <div class="cd-skill-desc">${ult.desc}</div>
    ${ultExtra}
  </div>`;
  // Awakened skill
  const aw = c.awakenSkill;
  const locked = r.star < 7;
  let awExtra = skillDetails(aw, true);
  let lockNote = '';
  if (locked) {
    lockNote = '<div style="font-size:0.55rem;color:var(--red);margin-top:4px">\u9700\u89817\u661F\u899C\u9192\u89E3\u9501</div>';
  }
  html += `<div class="cd-skill-card${locked ? ' locked' : ''}">
    <span class="cd-skill-name">${aw.name}</span><span class="cd-skill-type">${skillTag(aw)} ${locked ? '7\u661F\u899C\u9192\u89E3\u9501' : '\u899C\u9192\u6280\u80FD'}</span>
    <div class="cd-skill-desc">${aw.desc}</div>
    ${awExtra}
    ${lockNote}
  </div>`;
  return html;
}

function renderFormation() {
  const JOB_META = {
    '坦克':{icon:'🛡️',color:'#60a5fa',cls:'tank'},
    '战士':{icon:'⚔️',color:'#f87171',cls:'warrior'},
    '法师':{icon:'🔮',color:'#b388ff',cls:'mage'},
    '刺客':{icon:'🗡️',color:'#ff9f1c',cls:'assassin'},
    '辅助':{icon:'💚',color:'#34d399',cls:'support'}
  };

  function slotHTML(idx) {
    var cid = G.formation[idx];
    if (cid && G.roster[cid]) {
      var c = CHARS.find(function(ch) { return ch.id === cid; });
      var r = G.roster[cid];
      var jm = JOB_META[c.job] || {icon:'❓',color:'#888',cls:'dps'};
      var rc = rarCls(c.rarity);
      return `<div class="f-slot filled ${rc}" data-idx="${idx}">
        <img src="${c.img}" alt="${c.name}" loading="lazy">
        <div class="f-slot-nm">${c.name}</div>
        <div class="f-slot-lv"><span class="job-badge ${jm.cls}">${c.job}</span> ${formatTeamLv()}</div>
        <button class="f-slot-x" onclick="removeFromFormation(${idx})">\u2715</button>
      </div>`;
    }
    var labels = ['前排·坦克','前排·自由','前排·自由','后排·自由','后排·自由','后排·自由'];
    return `<div class="f-slot empty" data-idx="${idx}">${labels[idx]||'空位'}</div>`;
  }

  var activeChars = G.formation.filter(function(id) { return id && G.roster[id]; });
  var synHTML = '';
  for (var i = 0; i < SYNERGIES.length; i++) {
    var syn = SYNERGIES[i];
    if (isSynergyActive(syn, activeChars)) {
      synHTML += `<span class="syn-tag">${syn.name}</span>`;
    }
  }

  var inFormation = {};
  for (var i = 0; i < G.formation.length; i++) {
    if (G.formation[i]) inFormation[G.formation[i]] = true;
  }
  var bench = CHARS.filter(function(c) { return G.roster[c.id] && !inFormation[c.id]; });

  // Job stats summary
  var jobCount = {};
  activeChars.forEach(function(id) {
    var c = CHARS.find(function(ch) { return ch.id === id; });
    if (c && c.job) jobCount[c.job] = (jobCount[c.job] || 0) + 1;
  });
  var jobSummary = Object.keys(jobCount).map(function(j) {
    var jm = JOB_META[j] || {icon:'❓',cls:'dps'};
    return `<span class="job-badge ${jm.cls}">${jm.icon} ${j} \u00d7${jobCount[j]}</span>`;
  }).join(' ');

  var hasAny = activeChars.length > 0;

  // Build bench HTML grouped by rarity
  var benchHTML = '';
  if (bench.length > 0) {
    var benchGroups = [
      {label:'SSR', color:'#ffd700', chars: bench.filter(function(c){return c.rarity==='SSR';})},
      {label:'SS', color:'#00bcd4', chars: bench.filter(function(c){return c.rarity==='SS';})},
      {label:'SR', color:'#b388ff', chars: bench.filter(function(c){return c.rarity==='SR';})}
    ];
    for (var bg = 0; bg < benchGroups.length; bg++) {
      var grp = benchGroups[bg];
      if (grp.chars.length === 0) continue;
      benchHTML += '<div style="font-size:0.45rem;font-weight:900;color:' + grp.color + ';padding:0.2rem 0.2rem 0.1rem;border-bottom:1px solid ' + grp.color + '33;margin-top:0.2rem;text-align:left">' + grp.label + ' (' + grp.chars.length + ')</div>';
      benchHTML += '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">';
      for (var bi = 0; bi < grp.chars.length; bi++) {
        var c = grp.chars[bi];
        var jm = JOB_META[c.job] || {icon:'❓',cls:'dps',color:'#888'};
        benchHTML += '<div class="f-bench-c" onclick="addToFormation(\'' + c.id + '\')">' +
          '<img src="' + c.img + '" alt="' + c.name + '" style="border-color:' + jm.color + '">' +
          '<div>' + c.name + '</div>' +
          '<div><span class="job-badge ' + jm.cls + '" style="font-size:0.32rem">' + c.job + '</span></div>' +
          '<div style="font-size:0.35rem;color:var(--dim)">' + formatTeamLv() + '</div>' +
        '</div>';
      }
      benchHTML += '</div>';
    }
  } else {
    benchHTML = '<span style="opacity:0.5">无可用角色</span>';
  }

  $('formation').innerHTML = `
    <div class="form-title">编队出战</div>
    <div class="form-field">
      <div class="form-rl">🛡️ 前排 · 坦克/近战</div>
      <div class="form-row">${slotHTML(0)}${slotHTML(1)}${slotHTML(2)}</div>
      <div class="form-rl">⚔️ 后排 · 输出/辅助</div>
      <div class="form-row">${slotHTML(3)}${slotHTML(4)}${slotHTML(5)}</div>
    </div>
    <div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:4px 0">${jobSummary || '<span style="opacity:0.3;font-size:0.45rem">编入角色查看职业构成</span>'}</div>
    <div class="syn-row">${synHTML || '<span style="opacity:0.5;font-size:0.4rem">无激活羁绊</span>'}</div>
    <div style="font-size:0.4rem;color:var(--dim);text-align:center;margin:2px 0">点击角色上阵 · 建议: 坦克前排 + 输出后排 + 辅助</div>
    <div class="f-bench-filter" id="benchFilter"></div>
    <div class="f-bench" id="benchList">${benchHTML}</div>
    <div class="form-btns">
      <button class="f-go" ${hasAny ? '' : 'disabled'} onclick="startBattle()">开始战斗</button>
      <button class="f-back" onclick="show('hub');renderHub('battle')">返回</button>
    </div>
  `;
}

function addToFormation(charId) {
  for (var i = 0; i < G.formation.length; i++) {
    if (!G.formation[i]) {
      G.formation[i] = charId;
      saveGame();
      renderFormation();
      return;
    }
  }
}

function removeFromFormation(idx) {
  G.formation[idx] = null;
  saveGame();
  renderFormation();
}
function renderBattleTab() {
  var hasTeam = G.formation.filter(Boolean).length > 0;
  var autoOn = G.autoNext ? 'active' : '';

  // Idle rewards calculation
  if (!G.idle) G.idle = { lastCollect: Date.now() };
  if (!G.idle.lastCollect) G.idle.lastCollect = Date.now();
  var idleNow = Date.now();
  var idleSecs = Math.floor((idleNow - G.idle.lastCollect) / 1000);
  var maxIdleSecs = 8 * 3600; // cap at 8 hours
  idleSecs = Math.min(idleSecs, maxIdleSecs);
  var stageGoldBase = (50 + G.stage * 20) * 2;
  var stageExpBase = 20 + G.stage * 10;
  var stageGemsBase = 50;
  var idleGold = Math.floor(stageGoldBase * 0.02 * idleSecs);
  var idleExp = Math.floor(stageExpBase * 0.01 * idleSecs);
  var idleGems = Math.floor(stageGemsBase / 180 * idleSecs);
  var idleHours = Math.floor(idleSecs / 3600);
  var idleMins = Math.floor((idleSecs % 3600) / 60);
  var idleTimeStr = idleHours > 0 ? idleHours + '时' + idleMins + '分' : idleMins + '分钟';
  var hasIdle = idleSecs >= 60;
  var idleGoldPerH = Math.floor(stageGoldBase * 0.02 * 3600);
  var idleExpPerH = Math.floor(stageExpBase * 0.01 * 3600);
  var idleGemsPerH = Math.floor(stageGemsBase / 180 * 3600);

  var idleHtml = '<div style="background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,107,53,0.05));border:1px solid rgba(255,215,0,0.15);border-radius:12px;padding:0.3rem;margin-bottom:0.2rem">' +
    '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div><div style="font-size:0.48rem;font-weight:800;color:var(--gold)">⏰ 挂机收益</div>' +
        '<div style="font-size:0.33rem;color:var(--dim);margin-top:2px">每小时: +' + idleGoldPerH + '金 +' + idleExpPerH + 'EXP +' + idleGemsPerH + '💎</div></div>' +
      (hasIdle ? '<button onclick="collectIdleRewards()" style="background:linear-gradient(135deg,var(--gold),#ff9f1c);color:#000;border:none;padding:0.2rem 0.6rem;border-radius:8px;font-size:0.42rem;font-weight:800;cursor:pointer">领取</button>' :
        '<span style="font-size:0.38rem;color:var(--dim)">积累中...</span>') +
    '</div>' +
    (hasIdle ? '<div style="margin-top:0.15rem;padding:0.15rem;background:rgba(0,0,0,0.2);border-radius:6px;text-align:center">' +
      '<div style="font-size:0.38rem;color:var(--dim)">已积累 ' + idleTimeStr + ' (上限8小时)</div>' +
      '<div style="font-size:0.48rem;font-weight:800;color:var(--gold);margin-top:2px">💰' + idleGold.toLocaleString() + '  ⭐' + idleExp + ' EXP  💎' + idleGems + '</div>' +
    '</div>' : '') +
  '</div>';

  var curCh = Math.ceil(G.stage / 10);
  var curSub = ((G.stage - 1) % 10) + 1;
  var chNames = ['初始之地','迷雾森林','烈焰山谷','冰霜峡湾','暗影深渊','天空之城','时空裂隙','神域边境','混沌之源','终焉之门',
    '星辰荒原','龙脊雪峰','幽冥地牢','圣光殿堂','魔王城塞','虚空回廊','创世熔炉','永恒之塔','命运交叉','次元尽头'];
  var chElems = ['火','风','水','雷','暗','光','岩','火','风','暗','光','水','暗','光','火','暗','火','光','风','暗'];
  var viewCh = curCh;
  var chName = chNames[(viewCh - 1) % chNames.length] || '未知领域';
  var chElem = chElems[(viewCh - 1) % chElems.length] || '火';
  var stagesInCh = 10;
  var clearedInCh = Math.min(curSub - 1, stagesInCh);
  var progressPct = Math.floor((clearedInCh / stagesInCh) * 100);
  var elemColor = ELEM_COLOR[chElem] || '#ff6b35';

  var nodesHtml = '';
  for (var i = 1; i <= stagesInCh; i++) {
    var globalStage = (viewCh - 1) * 10 + i;
    var isCleared = globalStage < G.stage;
    var isCurrent = globalStage === G.stage;
    var isLocked = globalStage > G.stage;
    var isBoss = (i === 5 || i === 10);
    var cls = isCleared ? 'cleared' : isCurrent ? 'current' : 'locked';
    var icon = isCleared ? '✓' : isCurrent ? '⚔' : isBoss ? '💀' : '🔒';
    var stars = isCleared ? '★★★' : '';
    var onclick = isCurrent ? (hasTeam ? 'startBattle()' : "gameToast('提示', '请先在阵容页面编入角色！')") : '';
    var reward = isBoss ? '💎×200' : '💎×100';
    var nodeStyle = isCurrent ? 'border-color:' + elemColor + ';box-shadow:0 0 12px ' + elemColor + '40' : '';
    nodesHtml += '<div class="stage-node ' + cls + (isBoss ? ' boss-node' : '') + '"' +
      (isCurrent ? ' onclick="' + onclick + '"' : '') +
      (nodeStyle ? ' style="' + nodeStyle + '"' : '') + '>' +
      '<div class="stage-icon">' + icon + '</div>' +
      '<div class="stage-num">' + viewCh + '-' + i + '</div>' +
      (isCleared ? '<div class="stage-star">' + stars + '</div>' :
       !isLocked ? '<div style="font-size:0.24rem;color:var(--dim);margin-top:1px">' + reward + '</div>' : '') +
    '</div>';
  }

  return '<div class="battle-tab">' +
    idleHtml +
    '<div class="ch-header" style="border:1px solid ' + elemColor + '30">' +
      '<div class="ch-title" style="color:' + elemColor + '">第' + viewCh + '章 · ' + chName + '</div>' +
      '<div class="ch-sub">' + chElem + '属性区域 · 推荐等级 Lv.' + ((viewCh - 1) * 5 + 1) + '+</div>' +
      '<div style="display:flex;align-items:center;gap:0.2rem;justify-content:center;margin-top:0.15rem;position:relative">' +
        '<span style="font-size:0.32rem;color:var(--dim)">' + clearedInCh + '/' + stagesInCh + '</span>' +
        '<div class="ch-progress" style="flex:1;max-width:60%"><div class="ch-progress-fill" style="width:' + progressPct + '%;background:linear-gradient(90deg,' + elemColor + ',' + elemColor + 'aa)"></div></div>' +
        '<span style="font-size:0.32rem;color:var(--dim)">' + progressPct + '%</span>' +
      '</div>' +
    '</div>' +
    '<div class="stage-grid">' + nodesHtml + '</div>' +
    '<div style="text-align:center;padding:0.15rem 0;font-size:0.35rem;color:var(--dim)">第5关和第10关为精英关，奖励翻倍</div>' +
    '<div style="text-align:center;padding:0.2rem 0">' +
      '<button class="battle-go" onclick="' + (hasTeam ? 'startBattle()' : "gameToast(\'提示\',\'请先在阵容页面编入角色！\')") + '" ' + (hasTeam ? '' : 'style="opacity:0.5"') + ' style="background:linear-gradient(135deg,' + elemColor + ',' + elemColor + 'cc)">⚔ ' + viewCh + '-' + curSub + ' 开始战斗</button>' +
    '</div>' +
    '<div style="text-align:center;margin-top:0.1rem">' +
      '<button class="auto-next-btn ' + autoOn + '" onclick="G.autoNext=!G.autoNext;saveGame();renderHub(\'battle\')" style="font-size:0.45rem;padding:0.2rem 0.7rem">' +
        (G.autoNext ? '🔄 自动下一关: 开' : '⏸ 自动下一关: 关') +
      '</button>' +
    '</div>' +
  '</div>';
}
function renderResult(won, rewards) {
  rewards = rewards || {};
  var turns = rewards.turns || 0;
  var expRew = rewards.exp || 0;
  var goldRew = rewards.gold || 0;
  var gemRew = rewards.gems || 0;
  var stats = rewards.stats || {};
  var allyTeam = rewards.allyTeam || [];
  var enemyTeam = rewards.enemyTeam || [];

  function fmt(n) { return n >= 10000 ? (n/1000).toFixed(1)+'k' : (n||0).toString(); }
  function rarBorder(r) { return r==='SSR'?'rgba(255,215,0,0.6)':r==='SS'?'rgba(0,188,212,0.5)':'rgba(179,136,255,0.5)'; }

  function findStat(uid) {
    if (stats[uid]) return stats[uid];
    // Try base id without suffix
    var baseId = uid.replace(/_e\d+$/, '').replace(/_a\d+$/, '');
    if (stats[baseId]) return stats[baseId];
    // Search for any key starting with baseId
    for (var k in stats) {
      if (k === baseId || k.indexOf(baseId) === 0) return stats[k];
    }
    return {dmg:0,heal:0,taken:0,cc:0};
  }

  function buildCards(team, side) {
    var sorted = team.slice().sort(function(a,b) { var sa=findStat(a.id); var sb=findStat(b.id); return (sb.dmg||0)-(sa.dmg||0); });
    var maxDmg = 0;
    var mvpId = null;
    var totalDmg = 0;
    sorted.forEach(function(u) { var s = findStat(u.id); if((s.dmg||0)>maxDmg){maxDmg=s.dmg||0;mvpId=u.id;} totalDmg+=(s.dmg||0); });
    return sorted.map(function(u) {
      var s = findStat(u.id);
      var isDead = !u.alive;
      var isMvp = u.id === mvpId && maxDmg > 0;
      var cls = 'r-stat-card' + (isDead?' dead-card':'') + (isMvp?' mvp-card':'');
      var pCls = 'r-stat-portrait' + (isDead?' dead-portrait':'');
      var dmgPct = totalDmg > 0 ? Math.round((s.dmg||0) / totalDmg * 100) : 0;
      var pctBarColor = isMvp ? '#ff6b35' : '#3b82f6';
      return '<div class="'+cls+'">' +
        '<img class="'+pCls+'" src="'+u.img+'" style="border-color:'+rarBorder(u.rarity)+'">' +
        '<div class="r-stat-info">' +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
            '<div class="r-stat-name" style="color:'+rarBorder(u.rarity)+'">' + u.name + (isDead?' <span class="skull">&#x1F480;</span>':'') + '</div>' +
            '<span style="font-size:0.35rem;color:var(--dim);white-space:nowrap">'+dmgPct+'%</span>' +
          '</div>' +
          '<div class="r-stat-row">' +
            '<span class="r-stat-item dmg">&#x2694;&#xFE0F; '+fmt(s.dmg)+'</span>' +
            '<span class="r-stat-item taken">&#x1F6E1;&#xFE0F; '+fmt(s.taken)+'</span>' +
            '<span class="r-stat-item heal-s">&#x1F49A; '+fmt(s.heal)+'</span>' +
            '<span class="r-stat-item cc-s">&#x1F4AB; '+s.cc+'</span>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:4px;margin-top:1px">' +
            '<div style="flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">' +
              '<div style="height:100%;width:'+dmgPct+'%;background:'+pctBarColor+';border-radius:2px"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  var autoCountdownHtml = '';

  var isBoss = rewards._bossDmg !== undefined;
  var titleText = isBoss ? '\u23F9 \u6311\u6218\u7ED3\u675F' : (won ? '\u2714 \u80DC\u5229' : '\u2716 \u5931\u8D25');
  var titleColor = isBoss ? '#ff9f1c' : (won ? '#22c55e' : '#ff4444');

  $('result').innerHTML = '<div class="r-scroll" style="padding:0.3rem 0.4rem 0.5rem">' +
    '<div style="text-align:center;font-size:0.7rem;font-weight:900;color:'+titleColor+';padding:0.15rem 0">'+titleText+'</div>' +
    (isBoss ? '<div style="font-size:0.45rem;color:#ff4444;font-weight:900;text-align:center;margin-bottom:0.05rem">\u672C\u6B21\u4F24\u5BB3: ' + rewards._bossDmg.toLocaleString() + '</div><div style="font-size:0.5rem;color:#ff6b35;font-weight:900;text-align:center;margin-bottom:0.1rem">\u7D2F\u8BA1\u4F24\u5BB3: ' + (rewards._bossCumDmg || 0).toLocaleString() + '</div>' : '') +
    ((expRew||goldRew||gemRew) ? '<div style="font-size:0.55rem;color:var(--gold);font-weight:700;text-align:center;margin-bottom:0.15rem">'+(isBoss?'\u6311\u6218\u5956\u52B1 ':won?'':'\u5931\u8D25\u5956\u52B1 ')+'+'+expRew+' EXP +'+goldRew+' \u91D1\u5E01 +'+gemRew+' \uD83D\uDC8E</div>' : '') +
    '<div class="r-section" style="margin:0.1rem 0"><div class="r-section-title" style="padding:0.1rem 0;font-size:0.45rem">\u6211\u65B9\u6570\u636E</div>'+buildCards(allyTeam,'ally')+'</div>' +
    '<div class="r-section" style="margin:0.1rem 0"><div class="r-section-title" style="padding:0.1rem 0;font-size:0.45rem">\u5BF9\u65B9\u6570\u636E</div>'+buildCards(enemyTeam,'enemy')+'</div>' +
    autoCountdownHtml +
    '<div class="r-btn-wrap">' +
      '<button class="r-btn" onclick="afterResult('+(won?'true':'false')+')">\u8FD4\u56DE</button>' +
    '</div>' +
  '</div>';
}

var _autoCountdownTimer = null;
function startAutoCountdown(won) {
  cancelAutoCountdown();
  var count = 5;
  var el = document.getElementById('autoCountdown');
  if (el) el.textContent = count + '\u79D2\u540E\u81EA\u52A8\u8FDB\u5165\u4E0B\u4E00\u5173...';
  _autoCountdownTimer = setInterval(function() {
    count--;
    var el2 = document.getElementById('autoCountdown');
    if (count <= 0) {
      cancelAutoCountdown();
      if (el2) el2.textContent = '\u8FDB\u5165\u4E0B\u4E00\u5173...';
      afterResult(true);
    } else {
      if (el2) el2.textContent = count + '\u79D2\u540E\u81EA\u52A8\u8FDB\u5165\u4E0B\u4E00\u5173...';
    }
  }, 1000);
}
function cancelAutoCountdown() {
  if (_autoCountdownTimer) { clearInterval(_autoCountdownTimer); _autoCountdownTimer = null; }
}

function afterResult(won) {
  cancelAutoCountdown();
  if (B._autoNextTimer) { clearTimeout(B._autoNextTimer); B._autoNextTimer = null; }
  const fromArena = G._fromArena;
  const fromBoss = G._fromBoss;
  delete G._fromArena;
  delete G._arenaOpp;
  delete G._fromBoss;
  saveGame();
  show('hub');
  renderHub(fromBoss ? 'boss' : fromArena ? 'arena' : 'battle');
}

// --- Battle State ---
let B = { pt:[], et:[], done:false, turn:0, activeSyn:[], _actingUnit:null, _timer:null, speed:1, paused:false, stats:{} };
let particles = [];
const wait = ms => new Promise(r => setTimeout(r, Math.max(Math.floor(ms / B.speed), B.speed >= 5 ? 30 : 100)));
function trackStat(uid, type, val) {
  if (!B.stats[uid]) B.stats[uid] = { dmg:0, heal:0, taken:0, cc:0 };
  B.stats[uid][type] += val;
}

// --- DEBUFF DEFINITIONS ---
const DEBUFF_META = {
  burn:     {icon:'🔥', name:'灼烧', cls:'debuff', dot:true, dotPct:0.08},
  paralyze: {icon:'⚡', name:'麻痹', cls:'debuff', skip:true},
  stun:     {icon:'💫', name:'眩晕', cls:'debuff', skip:true},
  freeze:   {icon:'❄️', name:'冻结', cls:'debuff', skip:true, dot:true, dotPct:0.05},
  slow:     {icon:'🐌', name:'减速', cls:'debuff', statMod:{spd:-0.3}},
  weaken:   {icon:'⬇️', name:'虚弱', cls:'debuff', statMod:{atk:-0.25, def:-0.25}},
  defDown:  {icon:'🔻', name:'破防', cls:'debuff', statMod:{def:-0.35}},
  petrify:  {icon:'🪨', name:'石化', cls:'debuff', skip:true},
  knockup:  {icon:'🌪️', name:'击飞', cls:'debuff', skip:true},
  nullify:  {icon:'🚫', name:'虚无', cls:'debuff', skip:true, statMod:{atk:-0.5}},

  curse:{icon:'💀',name:'诅咒',color:'#4a148c',skip:false},
  sleep:{icon:'💤',name:'睡眠',color:'#5c6bc0',skip:true,wakeOnHit:true}
};

// --- Effective Stats with Buffs & Debuffs ---
function getEffectiveStats(unit) {
  let atk = unit.atk, def = unit.def, spd = unit.spd;
  // Buffs - cap total buff multiplier at 2x per stat
  let atkBuff = 0, defBuff = 0, spdBuff = 0;
  for (const b of unit.buffs) {
    if (b.stat === 'atk' || b.stat === 'all') atkBuff += b.pct;
    if (b.stat === 'def' || b.stat === 'all') defBuff += b.pct;
    if (b.stat === 'spd' || b.stat === 'all') spdBuff += b.pct;
  }
  atk *= (1 + Math.min(atkBuff, 1.0));
  def *= (1 + Math.min(defBuff, 1.0));
  spd *= (1 + Math.min(spdBuff, 1.0));
  // Debuffs with stat modifiers
  for (const d of (unit.debuffs || [])) {
    const meta = DEBUFF_META[d.type];
    if (meta && meta.statMod) {
      // Use custom debuffValue if stored on instance, otherwise use meta defaults
      if (d.customMod) {
        if (d.customMod.atk) atk *= (1 + d.customMod.atk);
        if (d.customMod.def) def *= (1 + d.customMod.def);
        if (d.customMod.spd) spd *= (1 + d.customMod.spd);
      } else {
        if (meta.statMod.atk) atk *= (1 + meta.statMod.atk);
        if (meta.statMod.def) def *= (1 + meta.statMod.def);
        if (meta.statMod.spd) spd *= (1 + meta.statMod.spd);
      }
    }
  }
  return { atk: Math.max(1, Math.floor(atk)), def: Math.max(1, Math.floor(def)), spd: Math.max(1, Math.floor(spd)) };
}

// --- Job Passive Helpers ---
function getCharJob(unit) {
  const c = CHARS.find(ch => ch.id === unit.id || ch.id === unit.id.replace(/_e\d+$/, '').replace(/_a\d+$/, ''));
  return c ? (c.job || '战士') : '战士';
}

function jobCritBonus(unit) {
  var j = getCharJob(unit);
  if (j === '刺客') return 0.20;
  if (j === '战士') return 0.10;
  return 0;
}
function jobSkillDmgBonus(unit) {
  var j = getCharJob(unit);
  if (j === '法师') return 0.15;
  if (j === '战士') return 0.05;
  return 0;
}
function jobHealBonus(unit) { return getCharJob(unit) === '辅助' ? 0.25 : 0; }
function jobControlBonus(unit) { return getCharJob(unit) === '辅助' ? 0.15 : 0; }
function jobBuffBonus(unit) { return getCharJob(unit) === '辅助' ? 0.15 : 0; }
function jobCritDmgBonus(unit) { return getCharJob(unit) === '刺客' ? 0.30 : 0; }

// --- Damage Calculation ---
function calcDmg(atk, def, mult, elemMul, extra) {
  extra = extra || {};
  let effectiveDef = extra.ignoreDef ? 0 : def;
  // Synergy penetration reduces effective defense
  if (extra.synPen) effectiveDef = Math.floor(effectiveDef * (1 - extra.synPen));
  let defReduce = effectiveDef / (effectiveDef + 80000);
  let dmg = atk * mult * (1 - defReduce);
  dmg *= elemMul;
  if (extra.skillDmgBonus) dmg *= (1 + extra.skillDmgBonus);
  // Synergy wind element damage bonus
  if (extra.synWindDmg) dmg *= (1 + extra.synWindDmg);
  if (extra.vsDark && extra.targetElem === '暗') dmg += extra.vsDark;
  return Math.max(Math.floor(dmg), Math.floor(atk * 0.1));
}

// --- Target Selection with Taunt ---
function pickTarget(enemies, allies) {
  const alive = enemies.filter(u => u.alive);
  if (!alive.length) return null;
  // Check for taunt
  const taunters = alive.filter(u => u.taunt && u.taunt > 0);
  if (taunters.length) {
    return taunters[Math.floor(Math.random() * taunters.length)];
  }
  const front = alive.filter(u => u.row === 'front');
  const pool = front.length ? front : alive;
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickAllyTarget(allies, mode) {
  const alive = allies.filter(u => u.alive);
  if (!alive.length) return null;
  if (mode === 'lowest_hp') {
    alive.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
    return alive[0];
  }
  return alive[Math.floor(Math.random() * alive.length)];
}

// --- Apply Debuff ---
function applyDebuff(target, debuffType, rate, source, customValue) {
  if (!target || !target.alive) return false;
  // Boss is immune to all debuffs
  if (G._fromBoss && target.side === 'foe') return false;
  const finalRate = rate + jobControlBonus(source || {});
  if (Math.random() > finalRate) return false;
  if (!target.debuffs) target.debuffs = [];
  // Don't stack same type
  if (target.debuffs.find(d => d.type === debuffType)) return false;
  var debuffEntry = { type: debuffType, turns: 2, sourceId: (source && source.id) || '' };
  // Store custom stat modifier if debuffValue was provided
  if (customValue && DEBUFF_META[debuffType] && DEBUFF_META[debuffType].statMod) {
    var cm = {};
    var baseMod = DEBUFF_META[debuffType].statMod;
    for (var k in baseMod) { cm[k] = baseMod[k] < 0 ? -customValue : customValue; }
    debuffEntry.customMod = cm;
  }
  target.debuffs.push(debuffEntry);
  const meta = DEBUFF_META[debuffType] || {};
  if (meta.skip && source && source.id) trackStat(source.id, 'cc', 1);
  const tEl = getUnitEl(target.id);
  if (tEl) {
    showFloatStatus(tEl, meta.name || debuffType, false);
    if (debuffType === 'burn') tEl.classList.add('burning');
    if (debuffType === 'freeze') tEl.classList.add('frozen');
    if (debuffType === 'stun' || debuffType === 'paralyze' || debuffType === 'petrify' || debuffType === 'knockup') tEl.classList.add('stunned');
    if (debuffType === 'weaken' || debuffType === 'nullify') tEl.classList.add('weakened');
  }
  return true;
}

// --- Apply Shield to target ---
function applyShield(target, amt) {
  if (!target || !target.alive) return;
  target.shield = Math.max(target.shield || 0, amt);
  const tEl = getUnitEl(target.id);
  if (tEl) {
    tEl.classList.add('shielded');
    showShieldPop(tEl);
    floatDmgAt(tEl, amt, false, false, true);
  }
}

// --- Cleanse debuffs ---
function cleanse(unit) {
  if (!unit.debuffs || !unit.debuffs.length) return;
  unit.debuffs = [];
  const el = getUnitEl(unit.id);
  if (el) {
    el.classList.remove('burning','frozen','stunned','weakened');
    showFloatStatus(el, '净化', true);
  }
}

// --- Revive ---
function reviveUnit(unit, hpPct) {
  if (unit.alive) return;
  unit.alive = true;
  unit.hp = Math.floor(unit.maxHp * (hpPct || 0.3));
  unit.debuffs = [];
  const el = getUnitEl(unit.id);
  if (el) {
    el.classList.remove('dead');
    showFloatStatus(el, '复活!', true);
    showSkillBurst(el, '#ffd700');
  }
}

// --- Synergy Calculation ---
function isSynergyActive(syn, charIds) {
  const ids = charIds.filter(Boolean);
  if (syn.matchType === 'elem') {
    const count = ids.filter(id => { const c = CHARS.find(ch => ch.id === id); return c && c.elem === syn.elem; }).length;
    return count >= syn.need;
  }
  if (syn.matchType === 'all') return syn.members.every(m => ids.includes(m));
  if (syn.matchType === 'any') return syn.members.filter(m => ids.includes(m)).length >= syn.need;
  if (syn.matchType === 'pairs') return syn.members.some(pair => pair.every(m => ids.includes(m)));
  if (syn.matchType === 'requiredAny') {
    return syn.members.required.every(m => ids.includes(m)) && syn.members.any.some(m => ids.includes(m));
  }
  return false;
}

function calcSynergies(formation) {
  const charIds = formation.filter(Boolean);
  return SYNERGIES.filter(syn => isSynergyActive(syn, charIds));
}

function applySynergyBonuses(units, synergies) {
  for (const syn of synergies) {
    const b = syn.bonus;
    for (const u of units) {
      // --- type (primary bonus) ---
      if (b.type === 'atk' || b.type === 'all') u.atk = Math.floor(u.atk * (1 + b.value));
      if (b.type === 'def' || b.type === 'all') u.def = Math.floor(u.def * (1 + b.value));
      if (b.type === 'spd' || b.type === 'all') u.spd = Math.floor(u.spd * (1 + b.value));
      if (b.type === 'all' || b.type === 'hp') { u.maxHp = Math.floor(u.maxHp * (1 + b.value)); u.hp = u.maxHp; }
      if (b.type === 'crit') u.synCrit = (u.synCrit || 0) + b.value;
      if (b.type === 'skillDmg') u.synSkillDmg = (u.synSkillDmg || 0) + b.value;
      if (b.type === 'penetration') u.synPen = (u.synPen || 0) + b.value;
      if (b.type === 'heal') u.synHeal = (u.synHeal || 0) + b.value;
      if (b.type === 'shield') u.synShield = (u.synShield || 0) + b.value;
      if (b.type === 'windDmg') u.synWindDmg = (u.synWindDmg || 0) + b.value;
      // --- type2 (secondary bonus) ---
      if (b.type2 === 'atk') u.atk = Math.floor(u.atk * (1 + b.value2));
      if (b.type2 === 'def') u.def = Math.floor(u.def * (1 + b.value2));
      if (b.type2 === 'spd') u.spd = Math.floor(u.spd * (1 + b.value2));
      if (b.type2 === 'heal') u.synHeal = (u.synHeal || 0) + b.value2;
      if (b.type2 === 'skillDmg') u.synSkillDmg = (u.synSkillDmg || 0) + b.value2;
      if (b.type2 === 'penetration') u.synPen = (u.synPen || 0) + b.value2;
      if (b.type2 === 'windDmg') u.synWindDmg = (u.synWindDmg || 0) + b.value2;
    }
  }
  // Apply synergy shield (percentage of maxHp) after all stat bonuses
  for (const u of units) {
    if (u.synShield) u.shield = Math.floor(u.maxHp * u.synShield);
  }
}

// --- Seeded Random ---
function seededRandom(seed) {
  var s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) | 0;
    return (s >>> 0) / 4294967296;
  };
}

function getCurrentTier() {
  const pts = (G.arena && G.arena.points) || 0;
  for (let i = ARENA_TIERS.length - 1; i >= 0; i--) {
    if (pts >= ARENA_TIERS[i].threshold) return { ...ARENA_TIERS[i], index: i };
  }
  return { ...ARENA_TIERS[0], index: 0 };
}

function getNextMondayMidnight() {
  const now = new Date();
  const day = now.getDay();
  const daysUntilMonday = day === 0 ? 1 : day === 1 ? 7 : (8 - day);
  const next = new Date(now);
  next.setDate(now.getDate() + daysUntilMonday);
  next.setHours(0, 0, 0, 0);
  return next.getTime();
}

// --- Start Battle ---
function startBattle() {
  cancelAutoCountdown();
  if (B._autoNextTimer) { clearTimeout(B._autoNextTimer); B._autoNextTimer = null; }
  // Clear arena/boss flags — this is a stage battle
  delete G._fromArena;
  delete G._fromBoss;
  delete G._arenaOpp;
  B = { pt:[], et:[], done:false, turn:0, activeSyn:[], enemySyn:[], _actingUnit:null, _timer:null, _autoNextTimer:null, speed: G.battleSpeed || 1, paused:false, stats:{} };

  const formChars = G.formation.filter(Boolean);
  B.pt = formChars.map((charId, i) => {
    const c = CHARS.find(ch => ch.id === charId);
    if (!c) return null;
    const st = getCharStats(charId);
    const job = c.job || '输出';
    const u = {
      id: charId, name: c.name, elem: c.elem, rarity: c.rarity,
      img: c.img, side: 'ally', job: job,
      maxHp: st.hp, hp: st.hp, atk: st.atk, def: st.def, spd: st.spd,
      skill: c.skill, ult: getActiveSkill(charId),
      rage: 0, alive: true, buffs: [], debuffs: [], shield: 0,
      taunt: 0, counter: false,
      row: i < 3 ? 'front' : 'back'
    };
    // Tank auto-taunt for 99 turns
    if (job === '坦克') u.taunt = 3;
    return u;
  }).filter(Boolean);

  const numEnemies = Math.min(3 + Math.floor(G.stage / 5), 6);
  // Fixed enemy composition based on stage
  const stageInChapter = ((G.stage - 1) % 10) + 1;
  const rng = seededRandom(G.stage * 31337 + 7919);

  // Boss (x0) and elite (x5) stages use preset synergy teams
  var presetUsed = null;
  if (stageInChapter === 10 || (stageInChapter === 5 && rng() < 0.7)) {
    var preset = getPresetTeamForSize(numEnemies, rng);
    if (preset) {
      presetUsed = preset;
      B.et = preset.members.map(function(id) {
        return CHARS.find(function(ch) { return ch.id === id; });
      }).filter(Boolean);
    }
  }

  if (!presetUsed) {
    const ssrPool = CHARS.filter(c => c.rarity === 'SSR');
    const ssPool = CHARS.filter(c => c.rarity === 'SS');
    const srPool = CHARS.filter(c => c.rarity === 'SR');
    const srssPool = srPool.concat(ssPool);

    B.et = [];
    const usedIds = {};
    function pickFromPool(pool) {
      let attempts = 0;
      while (attempts < 50) {
        const idx = Math.floor(rng() * pool.length);
        if (!usedIds[pool[idx].id]) { usedIds[pool[idx].id] = true; return pool[idx]; }
        attempts++;
      }
      return pool[Math.floor(rng() * pool.length)];
    }

    if (stageInChapter === 10) {
      for (let i = 0; i < Math.min(3, numEnemies); i++) B.et.push(pickFromPool(ssrPool));
      for (let i = B.et.length; i < numEnemies; i++) B.et.push(pickFromPool(srssPool));
    } else if (stageInChapter === 5) {
      B.et.push(pickFromPool(ssrPool));
      for (let i = 1; i < numEnemies; i++) B.et.push(pickFromPool(srssPool));
    } else {
      for (let i = 0; i < numEnemies; i++) B.et.push(pickFromPool(srssPool));
    }
  }

  const chapter = Math.ceil(G.stage / 10);
  const stagePower = (0.6 + G.stage * 0.05) * (1 + chapter * 0.1);
  const lvPower = 1 + (G.teamLv - 1) * 0.015;
  const rebirthPower = 1 + (G.rebirth || 0) * 0.15;
  const scale = stagePower * lvPower * rebirthPower;
  B.et = B.et.map((c, i) => {
    const job = c.job || '输出';
    const u = {
      id: c.id + '_e' + i, name: c.name, elem: c.elem, rarity: c.rarity,
      img: c.img, side: 'foe', job: job,
      maxHp: Math.floor(c.hp * HP_SCALE * scale), hp: Math.floor(c.hp * HP_SCALE * scale),
      atk: Math.floor(c.atk * scale), def: Math.floor(c.def * scale),
      spd: Math.floor(c.spd * scale),
      skill: c.skill, ult: c.ult,
      rage: 0, alive: true, buffs: [], debuffs: [], shield: 0,
      taunt: 0, counter: false,
      row: i < 3 ? 'front' : 'back'
    };
    if (job === '坦克') { u.taunt = 3; u.counter = true; }
    return u;
  });

  const synList = calcSynergies(G.formation);
  B.activeSyn = synList.map(s => s.name);
  applySynergyBonuses(B.pt, synList);

  // Show enemy synergies (display only, no stat bonus)
  var enemyIds = B.et.map(function(u) { return u.id.replace(/_e\d+$/, ''); });
  var enemySynList = calcSynergies(enemyIds);
  if (enemySynList.length) {
    B.enemySyn = enemySynList.map(function(s) { return s.name; });
  }

  B.turn = 0; B.done = false;
  show('battle');
  renderBattleField();
  showBattleStart();

  setTimeout(() => { if (!B.done) runBattleLoop(); }, 1200 / B.speed);
}

async function runBattleLoop() {
  while (!B.done) {
    await battleTick();
    if (!B.done) await wait(300);
  }
}

// --- Render Battle Field ---

    const deadCls = u.alive ? '' : ' dead';
    const rageFull = u.rage >= 100 ? ' rage-full' : '';
