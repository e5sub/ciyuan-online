function toggleSpeed() {
  var spds = [1,2,3,5];
  var idx = spds.indexOf(B.speed);
  B.speed = spds[(idx + 1) % spds.length];
  G.battleSpeed = B.speed;
  updateBattleAnimSpeed();
  // Restart boss timer at new speed if active
  if (B._bossTimerInterval && G._fromBoss) {
    clearInterval(B._bossTimerInterval);
    B._bossTimerInterval = setInterval(function() {
      if (B.done) { clearInterval(B._bossTimerInterval); return; }
      B._bossTimeLeft--;
      var el = document.getElementById('boss-timer');
      if (el) {
        var m = Math.floor(B._bossTimeLeft / 60);
        var s = B._bossTimeLeft % 60;
        el.textContent = '\u23F1 ' + m + ':' + (s < 10 ? '0' : '') + s;
        if (B._bossTimeLeft <= 60) el.style.color = '#ff2222';
      }
      if (B._bossTimeLeft > 0 && B._bossTimeLeft % 60 === 0) {
        B._bossAtkStacks++;
        var boss = B.et[0];
        if (boss && boss.alive) {
          boss.atk = Math.floor(boss.atk * 1.15);
          var bEl = getUnitEl(boss.id);
          if (bEl) showFloatStatus(bEl, '\u72C2\u66B4+' + (B._bossAtkStacks * 15) + '%', true);
        }
      }
      if (B._bossTimeLeft <= 0) {
        clearInterval(B._bossTimerInterval);
        if (!B.done) endBattle(false);
      }
    }, Math.max(1000 / B.speed, B.speed >= 5 ? 200 : 333));
  }
  saveGame();
  const btn = document.querySelector('.b-spd');
  if (btn) btn.textContent = '×' + B.speed;
}
function updateBattleAnimSpeed() {
  var old = document.getElementById('battle-spd-style');
  if (old) old.remove();
  if (B.speed <= 1) return;
  var r = 1 / B.speed;
  var s = document.createElement('style');
  s.id = 'battle-spd-style';
  s.textContent =
    '.float-dmg{animation-duration:' + (2.5*r).toFixed(2) + 's!important}' +
    '.float-dmg.heal{animation-duration:' + (2*r).toFixed(2) + 's!important}' +
    '.float-debuff{animation-duration:' + (2.5*r).toFixed(2) + 's!important}' +
    '.float-buff{animation-duration:' + (1.2*r).toFixed(2) + 's!important}' +
    '.impact-ring{animation-duration:' + (0.5*r).toFixed(2) + 's!important}' +
    '.slash-fx{animation-duration:' + (0.35*r).toFixed(2) + 's!important}' +
    '.skill-burst{animation-duration:' + (0.7*r).toFixed(2) + 's!important}' +
    '.b-start-t{animation-duration:' + (1.2*r).toFixed(2) + 's!important}' +
    '.skill-banner{animation-duration:' + (1.1*r).toFixed(2) + 's!important}' +
    '.heal-aura{animation-duration:' + (0.8*r).toFixed(2) + 's!important}' +
    '.shield-pop{animation-duration:' + (0.6*r).toFixed(2) + 's!important}' +
    '.buff-particle{animation-duration:' + (0.8*r).toFixed(2) + 's!important}';
  document.head.appendChild(s);
}

function exitBattle() {
  // Stop everything: auto-next timer, battle loop, countdown, particles
  B.done = true;
  if (B._timer) { clearInterval(B._timer); B._timer = null; }
  if (B._autoNextTimer) { clearTimeout(B._autoNextTimer); B._autoNextTimer = null; }
  if (B._bossTimerInterval) { clearInterval(B._bossTimerInterval); B._bossTimerInterval = null; }
  if (B._particleRAF) { cancelAnimationFrame(B._particleRAF); B._particleRAF = null; }
  _unitElCache = {};
  _bFieldCache = null;
  cancelAutoCountdown();
  G.autoNext = false;
  var spdStyle = document.getElementById('battle-spd-style');
  if (spdStyle) spdStyle.remove();
  var returnTab = G._fromBoss ? 'boss' : G._fromArena ? 'arena' : 'battle';
  delete G._fromArena;
  delete G._fromBoss;
  delete G._arenaOpp;
  saveGame();
  show('hub');
  renderHub(returnTab);
}

// --- Update Battle UI ---
var _unitElCache = {};
function getUnitEl(uid) {
  if (_unitElCache[uid] && _unitElCache[uid].isConnected) return _unitElCache[uid];
  var el = document.querySelector('.b-unit[data-uid="' + uid + '"]');
  if (el) _unitElCache[uid] = el;
  return el;
}
function updateBattleUI() {
  const allUnits = [...B.pt, ...B.et];
  for (const u of allUnits) {
    const el = getUnitEl(u.id);
    if (!el) continue;
    const hpPct = Math.max(0, Math.min(100, (u.hp / u.maxHp) * 100));
    const ragePct = Math.max(0, Math.min(100, u.rage));
    const hpBar = el.querySelector('.b-hp-f');
    if (hpBar) hpBar.style.width = hpPct + '%';
    const rageBar = el.querySelector('.b-rage-f');
    if (rageBar) rageBar.style.width = ragePct + '%';
    // Shield bar
    const shieldBar = el.querySelector('.b-shield-f');
    if (shieldBar) {
      const sPct = u.shield > 0 ? Math.min(100, (u.shield / u.maxHp) * 100) : 0;
      shieldBar.style.width = sPct + '%';
    }
    if (u.shield > 0 && !el.querySelector('.b-shield')) {
      const bars = el.querySelector('.b-bars');
      if (bars) bars.insertAdjacentHTML('beforeend', `<div class="b-shield"><div class="b-shield-f" style="width:${Math.min(100,(u.shield/u.maxHp)*100)}%"></div></div>`);
    }
    // Dead
    if (!u.alive) el.classList.add('dead'); else el.classList.remove('dead');
    // Rage full
    if (u.rage >= 100) el.classList.add('rage-full'); else el.classList.remove('rage-full');
    // Shield visual
    if (u.shield > 0) el.classList.add('shielded'); else el.classList.remove('shielded');
    // Taunt visual
    if (u.taunt > 0) el.classList.add('taunting'); else el.classList.remove('taunting');
    // Debuff visuals
    const hasDebuff = (type) => (u.debuffs || []).some(d => d.type === type);
    if (hasDebuff('burn')) el.classList.add('burning'); else el.classList.remove('burning');
    if (hasDebuff('freeze')) el.classList.add('frozen'); else el.classList.remove('frozen');
    if (hasDebuff('stun') || hasDebuff('paralyze') || hasDebuff('petrify') || hasDebuff('knockup')) el.classList.add('stunned'); else el.classList.remove('stunned');
    if (hasDebuff('weaken') || hasDebuff('nullify') || hasDebuff('defDown') || hasDebuff('slow')) el.classList.add('weakened'); else el.classList.remove('weakened');
    // Status icons
    const statusEl = el.querySelector('.b-status');
    if (statusEl) {
      let sh = '';
      if (u.taunt > 0) sh += '<span class="b-st-icon taunt-st">嘲讽</span>';
      if (u.shield > 0) sh += `<span class="b-st-icon shield-st">🛡${u.shield}</span>`;
      for (const b of (u.buffs || [])) {
        const label = b.stat === 'all' ? '全↑' : (b.stat === 'atk' ? '攻↑' : b.stat === 'def' ? '防↑' : b.stat === 'spd' ? '速↑' : '↑');
        sh += `<span class="b-st-icon buff">${label}</span>`;
      }
      for (const d of (u.debuffs || [])) {
        const meta = DEBUFF_META[d.type] || {};
        sh += `<span class="b-st-icon debuff">${meta.icon||'⬇️'}</span>`;
      }
      statusEl.innerHTML = sh;
    }
  }
  // Update turn counter
  const bTurn = document.getElementById('b-turn');
  if (bTurn) bTurn.textContent = '回合 ' + B.turn;
  // Boss HP bar update
  if (G._fromBoss && B.et[0]) {
    const bFill = document.getElementById('boss-hp-fill');
    const bTxt = document.getElementById('boss-hp-txt');
    const bDmg = document.getElementById('boss-dmg-total');
    if (bFill) bFill.style.width = Math.max(0, (B.et[0].hp / B.et[0].maxHp) * 100) + '%';
    if (bTxt) bTxt.textContent = Math.max(0, B.et[0].hp).toLocaleString() + ' / ' + B.et[0].maxHp.toLocaleString();
    let td = 0; for (const u of B.pt) { if (B.stats[u.id]) td += B.stats[u.id].dmg || 0; }
    if (B._bossMaxHp) td = Math.min(td, B._bossMaxHp);
    if (bDmg) bDmg.textContent = '总伤害: ' + td.toLocaleString();
  }
}

// --- Battle Tick ---
async function battleTick() {
  if (B.done) return;
  B.turn++;

  const allAlive = [...B.pt, ...B.et].filter(u => u.alive);
  allAlive.sort((a, b) => getEffectiveStats(b).spd - getEffectiveStats(a).spd);

  // Process DOT and decrement debuffs
  for (const u of allAlive) {
    if (!u.debuffs) u.debuffs = [];
    for (let i = u.debuffs.length - 1; i >= 0; i--) {
      const d = u.debuffs[i];
      const meta = DEBUFF_META[d.type];
      // DOT damage
      if (meta && meta.dot && meta.dotPct) {
        const dotDmg = Math.floor(u.maxHp * meta.dotPct);
        u.hp -= dotDmg;
        trackStat(u.id, 'taken', dotDmg);
        if (d.sourceId) trackStat(d.sourceId, 'dmg', dotDmg);
        const el = getUnitEl(u.id);
        if (el) {
          floatDmgAt(el, dotDmg, false, false, false, false, false);
          if (d.type === 'burn') showImpact(el, '#ff4d2a');
          if (d.type === 'freeze') showImpact(el, '#3b82f6');
        }
        if (u.hp <= 0) { u.hp = 0; u.alive = false; }
      }
      // Poison DOT
      if (d.type === 'poison') {
        const dotDmg = Math.floor(u.maxHp * 0.06);
        u.hp -= dotDmg;
        trackStat(u.id, 'taken', dotDmg);
        if (d.sourceId) trackStat(d.sourceId, 'dmg', dotDmg);
        const el = getUnitEl(u.id);
        if (el) {
          floatDmgAt(el, dotDmg, false, false, false, false, false);
          showImpact(el, '#9c27b0');
        }
        if (u.hp <= 0) { u.hp = 0; u.alive = false; }
      }
      // Bleed DOT
      if (d.type === 'bleed') {
        const dotDmg = Math.floor(u.maxHp * 0.08);
        u.hp -= dotDmg;
        trackStat(u.id, 'taken', dotDmg);
        if (d.sourceId) trackStat(d.sourceId, 'dmg', dotDmg);
        const el = getUnitEl(u.id);
        if (el) {
          floatDmgAt(el, dotDmg, false, false, false, false, false);
          showImpact(el, '#c62828');
        }
        if (u.hp <= 0) { u.hp = 0; u.alive = false; }
      }
      d.turns--;
      if (d.turns <= 0) {
        u.debuffs.splice(i, 1);
        const el = getUnitEl(u.id);
        if (el) {
          el.classList.remove('burning','frozen','stunned','weakened');
        }
      }
    }
    // Decrement buffs
    u.buffs = u.buffs.filter(b => { b.turns--; return b.turns > 0; });
  }

  updateBattleUI();
  if (checkBattleEnd()) return;

  const _ultCount = {ally: 0, foe: 0};
  for (const unit of allAlive) {
    if (B.done) break;
    if (!unit.alive) continue;
    const sk = unit.side === 'ally' ? 'ally' : 'foe';
    if (unit.rage >= 100 && unit.ult && _ultCount[sk] >= 2) {
      unit.rage = 99;
    }
    const hadUlt = unit.rage >= 100 && unit.ult;
    await processUnit(unit);
    if (hadUlt) _ultCount[sk]++;
    if (checkBattleEnd()) break;
  }

  // Decrement taunt at END of turn (after all units acted)
  for (const u of [...B.pt, ...B.et]) {
    if (u.alive && u.taunt > 0) u.taunt--;
  }

  updateBattleUI();
}

// --- Process Unit Turn ---
async function processUnit(unit) {
  if (B.done || !unit.alive) return;

  // Check if stunned/paralyzed/frozen/petrified/knocked up -> skip turn
  if (unit.debuffs && unit.debuffs.length) {
    for (const d of unit.debuffs) {
      const meta = DEBUFF_META[d.type];
      if (meta && meta.skip) {
        const el = getUnitEl(unit.id);
        if (el) showFloatStatus(el, meta.name + '!', false);
        await wait(400);
        return;
      }
    }
  }

  const el = getUnitEl(unit.id);
  if (el) el.classList.add('acting');
  B._actingUnit = unit;

  await new Promise(r => setTimeout(r, Math.max(250 / B.speed, B.speed >= 5 ? 40 : 100)));
  if (B.done) return;

  try {
    if (unit.rage >= 100 && unit.ult) {
      const color = ELEM_COLOR[unit.elem] || '#fff';
      showSkillBanner(unit.ult.name || '奥义', unit.name, color, unit.img);
      flashUlt(color);
      await new Promise(r => setTimeout(r, Math.max(500 / B.speed, B.speed >= 5 ? 80 : 200)));
      if (!B.done) await doUltimate(unit);
      unit.rage = 0;
    } else {
      await doSkill(unit);
    }
  } catch (e) {}

  // Add rage (staggered to prevent all ults firing at once)
  if (unit.alive) {
    unit.rage = Math.min(100, unit.rage + 25);
    const team = unit.side === 'ally' ? B.pt : B.et;
    for (const t of team) {
      if (t.alive && t !== unit) t.rage = Math.min(100, t.rage + 5);
    }
  }

  if (el) el.classList.remove('acting');
  B._actingUnit = null;
  updateBattleUI();
}

// --- Do Skill (Normal Attack) ---
async function doSkill(unit) {
  if (B.done) return;
  const enemies = unit.side === 'ally' ? B.et : B.pt;
  const allies = unit.side === 'ally' ? B.pt : B.et;
  const skill = unit.skill;

  // Handle heal type — scales with ATK: base + ATK*0.5 + jobHealBonus
  // If mult > 0, also deal damage to enemies first
  if (skill && skill.type === 'heal') {
    const stats = getEffectiveStats(unit);
    // Deal damage if mult > 0
    if (skill.mult > 0) {
      const dmgTargets = [pickTarget(enemies, allies)].filter(Boolean);
      for (const dt of dmgTargets) {
        if (!dt || !dt.alive) continue;
        const dtEl = getUnitEl(dt.id);
        const em = elemMult(unit.elem, dt.elem);
        const dtStats = getEffectiveStats(dt);
        const d = calcDmg(stats.atk, dtStats.def, skill.mult, em, {});
        dt.hp -= d; trackStat(unit.id, 'dmg', d);
        if (dtEl) floatDmgAt(dtEl, d, false, false);
        if (dt.hp <= 0) { dt.hp = 0; dt.alive = false; }
      }
      await wait(200);
    }
    // Heal
    const target = pickAllyTarget(allies, 'lowest_hp');
    if (!target) { updateBattleUI(); return; }
    const baseHeal = (skill.extra && skill.extra.amt) ? skill.extra.amt : Math.floor(stats.atk * (skill.mult || 1));
    const atkScaling = Math.floor(stats.atk * 0.10);
    let healAmt = Math.floor((baseHeal + atkScaling) * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
    // Check for curse debuff - halve healing
    if (target.debuffs && target.debuffs.some(function(d) { return d.type === 'curse'; })) {
      healAmt = Math.floor(healAmt * 0.5);
    }
    target.hp = Math.min(target.maxHp, target.hp + healAmt);
    trackStat(unit.id, 'heal', healAmt);
    const tEl = getUnitEl(target.id);
    if (tEl) { floatDmgAt(tEl, healAmt, false, true); showHealAura(tEl); }
    updateBattleUI();
    await wait(200);
    return;
  }

  // Handle shield type
  // If mult > 0, also deal damage to enemies first
  if (skill && skill.type === 'shield') {
    // Shield = base amt + 5% of unit's maxHp for normal skill
    const baseShield = (skill.extra && skill.extra.amt) ? skill.extra.amt : Math.floor(getEffectiveStats(unit).def * 2);
    const shieldAmt = baseShield + Math.floor(unit.maxHp * 0.05);
    // Deal damage if mult > 0
    if (skill.mult > 0) {
      const stats = getEffectiveStats(unit);
      const dmgTargets = skill.aoe ? enemies.filter(u => u.alive) : [pickTarget(enemies, allies)].filter(Boolean);
      for (const dt of dmgTargets) {
        if (!dt || !dt.alive) continue;
        const dtEl = getUnitEl(dt.id);
        const em = elemMult(unit.elem, dt.elem);
        const dtStats = getEffectiveStats(dt);
        const d = calcDmg(stats.atk, dtStats.def, skill.mult, em, {});
        dt.hp -= d; trackStat(unit.id, 'dmg', d);
        if (dtEl) floatDmgAt(dtEl, d, false, false);
        if (dt.hp <= 0) { dt.hp = 0; dt.alive = false; }
      }
      await wait(200);
    }
    // Shield self + if aoe, shield all allies
    if (skill.aoe) {
      const aliveAllies = allies.filter(u => u.alive);
      for (const a of aliveAllies) applyShield(a, Math.floor(shieldAmt / aliveAllies.length * 1.5));
    } else {
      applyShield(unit, shieldAmt);
    }
    // Tank auto-taunt refresh
    if (getCharJob(unit) === '坦克') {
      unit.taunt = 2;
      showFloatStatus(getUnitEl(unit.id), '嘲讽!', true);
    }
    updateBattleUI();
    await wait(200);
    return;
  }

  // Handle buff type (new: 喜羊羊/梅林/哆啦A梦 normal skills)
  if (skill && skill.type === 'buff') {
    await applyBuffSkill(unit, skill, allies);
    return;
  }

  // Normal attack / damage type
  const isAoe = skill && skill.aoe;
  const targets = isAoe ? enemies.filter(u => u.alive) : [pickTarget(enemies, allies)].filter(Boolean);
  if (!targets.length) return;

  const attackerEl = getUnitEl(unit.id);
  const stats = getEffectiveStats(unit);
  const mult = (skill && skill.mult) ? skill.mult : 1;

  for (const target of targets) {
    if (!target || !target.alive) continue;
    const targetEl = getUnitEl(target.id);
    const em = elemMult(unit.elem, target.elem);

    if (!isAoe && attackerEl && targetEl) dashAttack(attackerEl, targetEl);
    if (!isAoe) await new Promise(r => setTimeout(r, Math.max(400 / B.speed, B.speed >= 5 ? 60 : 200)));

    // Dodge check
    if (target.dodge && Math.random() < target.dodge) {
      if (targetEl) showFloatStatus(targetEl, '闪避!', false);
      continue;
    }

    // Crit
    let isCrit = false;
    let critMul = 1;
    let critRate = (skill && skill.extra) ? (skill.extra.critBonus || 0) : 0;
    critRate += jobCritBonus(unit);
    critRate += (unit.synCrit || 0);
    if (critRate > 0 && Math.random() < critRate) { isCrit = true; critMul = 1.5 + jobCritDmgBonus(unit); }

    let dmg = calcDmg(stats.atk, getEffectiveStats(target).def, mult, em, {
      ignoreDef: skill && skill.extra && skill.extra.ignoreDef,
      vsDark: skill && skill.extra && skill.extra.vsDark,
      targetElem: target.elem,
      skillDmgBonus: jobSkillDmgBonus(unit) + (unit.synSkillDmg || 0),
      synPen: unit.synPen || 0,
      synWindDmg: (unit.elem === '风') ? (unit.synWindDmg || 0) : 0
    });
    dmg = Math.floor(dmg * critMul);

    // Assassin execute: +50% damage when target below 30% HP
    if (getCharJob(unit) === '刺客' && target.hp < target.maxHp * 0.3) {
      dmg = Math.floor(dmg * 1.5);
    }

    // Shield absorption
    var totalDmg = dmg;
    if (target.shield > 0) {
      if (dmg <= target.shield) { target.shield -= dmg; dmg = 0; }
      else { dmg -= target.shield; target.shield = 0; }
    }
    target.hp -= dmg;
    trackStat(unit.id, 'dmg', totalDmg);
    trackStat(target.id, 'taken', totalDmg);

    if (targetEl) {
      floatDmgAt(targetEl, dmg, isCrit, false);
      showImpact(targetEl, ELEM_COLOR[unit.elem] || '#fff');
      if (!isAoe) showSlash(targetEl, ELEM_COLOR[unit.elem] || '#fff');
      if (isAoe) showSkillBurst(targetEl, ELEM_COLOR[unit.elem] || '#fff');
      shakeUnit(targetEl);
    }

    if (target.hp <= 0) { target.hp = 0; target.alive = false; }

    // Wake sleeping units on hit
    if (target.debuffs) {
      target.debuffs = target.debuffs.filter(function(d) {
        if (d.type === 'sleep') {
          showFloatStatus(target.el || getUnitEl(target.id), '苏醒!', true);
          return false;
        }
        return true;
      });
    }

    // Warrior bonus: extra rage when hit
    if (target.alive && dmg > 0 && getCharJob(target) === '战士') {
      target.rage = Math.min(100, (target.rage || 0) + 10);
    }

    // Lifesteal from skill
    if (skill && skill.extra && skill.extra.lifesteal && dmg > 0) {
      var healAmt = Math.floor(dmg * skill.extra.lifesteal);
      unit.hp = Math.min(unit.hp + healAmt, unit.maxHp);
      showFloatStatus(attackerEl || getUnitEl(unit.id), '+' + healAmt, true);
    }

    // Apply debuff from skill
    if (skill && skill.extra && skill.extra.debuff) {
      const rate = skill.extra.debuffRate || 0.3;
      if (target.alive) applyDebuff(target, skill.extra.debuff, rate, unit, skill.extra.debuffValue);
    }

    // Counter check: if target is alive, has counter, and is tank
    if (target.alive && target.counter && Math.random() < 0.3) {
      const counterDmg = Math.floor(getEffectiveStats(target).atk * 0.5);
      unit.hp -= counterDmg;
      trackStat(target.id, 'dmg', counterDmg);
      trackStat(unit.id, 'taken', counterDmg);
      if (attackerEl) { floatDmgAt(attackerEl, counterDmg, false, false); showImpact(attackerEl, '#fbbf24'); }
      if (unit.hp <= 0) { unit.hp = 0; unit.alive = false; }
      showFloatStatus(getUnitEl(target.id), '反击!', true);
    }
  }

  if (isAoe) { shakeScreen(); await wait(250); }

  // Self-heal from skill extra
  if (skill && skill.extra && typeof skill.extra.heal === 'number' && skill.extra.heal > 0) {
    const healBase = skill.extra.heal + Math.floor(getEffectiveStats(unit).atk * 0.10);
    let healAmt = Math.floor(healBase * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
    if (skill.aoe) {
      for (const a of allies.filter(u => u.alive)) {
        let aHeal = healAmt;
        if (a.debuffs && a.debuffs.some(function(d) { return d.type === 'curse'; })) { aHeal = Math.floor(aHeal * 0.5); }
        a.hp = Math.min(a.maxHp, a.hp + aHeal);
        trackStat(unit.id, 'heal', aHeal);
        const aEl = getUnitEl(a.id);
        if (aEl) { floatDmgAt(aEl, aHeal, false, true); showHealAura(aEl); }
      }
    } else {
      if (unit.debuffs && unit.debuffs.some(function(d) { return d.type === 'curse'; })) { healAmt = Math.floor(healAmt * 0.5); }
      unit.hp = Math.min(unit.maxHp, unit.hp + healAmt);
      trackStat(unit.id, 'heal', healAmt);
      const uEl = getUnitEl(unit.id);
      if (uEl) { floatDmgAt(uEl, healAmt, false, true); showHealAura(uEl); }
    }
  }

  // Dodge bonus (Eren skill) — capped at 75%
  if (skill && skill.extra && skill.extra.dodgeBonus) {
    unit.dodge = Math.min((unit.dodge || 0) + skill.extra.dodgeBonus, 0.75);
  }

  // Purify (Link awaken — cleanse all allies after attack)
  if (skill && skill.extra && skill.extra.purify) {
    for (const a of allies.filter(u => u.alive)) cleanse(a);
    const uEl2 = getUnitEl(unit.id);
    if (uEl2) showFloatStatus(uEl2, '净化!', true);
  }

  // Self-buff from dmg skill (Rimuru 暴食之王 etc.)
  if (skill && skill.extra && skill.extra.stat && skill.extra.pct) {
    const bStat = skill.extra.stat;
    const bPct = skill.extra.pct * (1 + jobBuffBonus(unit));
    const bTurns = (skill.extra.turns || 2) + 1;
    unit.buffs.push({ stat: bStat, pct: bPct, turns: bTurns });
    const uEl3 = getUnitEl(unit.id);
    if (uEl3) { showBuffParticles(uEl3, ELEM_COLOR[unit.elem] || '#fff'); showFloatStatus(uEl3, bStat === 'all' ? '全属性↑' : bStat + '↑', true); }
  }

  // Self-shield from dmg skill (Patrick 巨石压顶 etc.)
  if (skill && skill.extra && skill.extra.shield) {
    var selfShieldAmt = skill.extra.shield + Math.floor(unit.maxHp * 0.05);
    applyShield(unit, selfShieldAmt);
    const uEl4 = getUnitEl(unit.id);
    if (uEl4) showFloatStatus(uEl4, '护盾!', true);
  }

  updateBattleUI();
  await wait(200);
}

// --- Apply Buff Skill ---
async function applyBuffSkill(unit, skill, allies) {
  const buffStat = (skill.extra && skill.extra.stat) || 'atk';
  const buffPct = (skill.extra && skill.extra.pct) || 0.2;
  const buffTurns = ((skill.extra && skill.extra.turns) || 2) + 1;
  const enhanced = buffPct * (1 + jobBuffBonus(unit));
  const color = ELEM_COLOR[unit.elem] || '#fff';
  const enemies = unit.side === 'ally' ? B.et : B.pt;

  // Deal damage if mult > 0 (buff + damage hybrid)
  if (skill.mult && skill.mult > 0) {
    const stats = getEffectiveStats(unit);
    const isAoe = skill.aoe;
    const dmgTargets = isAoe ? enemies.filter(u => u.alive) : [pickTarget(enemies, allies)].filter(Boolean);
    for (const dt of dmgTargets) {
      if (!dt || !dt.alive) continue;
      const dtEl = getUnitEl(dt.id);
      const em = elemMult(unit.elem, dt.elem);
      const dtStats = getEffectiveStats(dt);
      let d = calcDmg(stats.atk, dtStats.def, skill.mult, em, { skillDmgBonus: jobSkillDmgBonus(unit) + (unit.synSkillDmg || 0), synPen: unit.synPen || 0, synWindDmg: (unit.elem === '風') ? (unit.synWindDmg || 0) : 0 });
      var totalD = d;
      if (dt.shield > 0) {
        if (d <= dt.shield) { dt.shield -= d; d = 0; }
        else { d -= dt.shield; dt.shield = 0; }
      }
      dt.hp -= d; trackStat(unit.id, 'dmg', totalD); trackStat(dt.id, 'taken', totalD);
      if (dtEl) { floatDmgAt(dtEl, totalD, false, false); showImpact(dtEl, color); dtEl.classList.add('hit'); setTimeout(() => dtEl.classList.remove('hit'), 300); }
      if (dt.hp <= 0) { dt.hp = 0; dt.alive = false; }
    }
  }

  // Always buff all allies for buff-type skills
  const aliveAllies = allies.filter(u => u.alive);
  for (const a of aliveAllies) {
    a.buffs.push({ stat: buffStat, pct: enhanced, turns: buffTurns });
    const aEl = getUnitEl(a.id);
    if (aEl) { showBuffParticles(aEl, color); showFloatStatus(aEl, buffStat === 'all' ? '全属性↑' : buffStat + '↑', true); }
  }

  // Shield from buff skill
  if (skill.extra && skill.extra.shield) {
    const aliveAllies2 = allies.filter(u => u.alive);
    var shieldPerAlly = Math.floor((skill.extra.shield + unit.maxHp * 0.05) / aliveAllies2.length);
    for (const a of aliveAllies2) applyShield(a, shieldPerAlly);
  }

  // Heal from buff skill (rimuru, xyy, anya awaken etc.)
  if (skill.extra && skill.extra.heal) {
    var bHealAmt;
    if (typeof skill.extra.heal === 'number') {
      bHealAmt = Math.floor((skill.extra.heal + getEffectiveStats(unit).atk * 0.10) * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
    } else {
      bHealAmt = Math.floor((2000 + getEffectiveStats(unit).atk * 0.15) * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
    }
    for (const a of allies.filter(u => u.alive)) {
      let aHeal = bHealAmt;
      if (a.debuffs && a.debuffs.some(function(d) { return d.type === 'curse'; })) { aHeal = Math.floor(aHeal * 0.5); }
      a.hp = Math.min(a.maxHp, a.hp + aHeal);
      trackStat(unit.id, 'heal', aHeal);
      const aEl = getUnitEl(a.id);
      if (aEl) { floatDmgAt(aEl, aHeal, false, true); showHealAura(aEl); }
    }
  }

  // Dodge bonus from buff skill (xyy 聪明闪躲) — capped at 75%
  if (skill.extra && skill.extra.dodgeBonus) {
    for (const a of aliveAllies) {
      a.dodge = Math.min((a.dodge || 0) + skill.extra.dodgeBonus, 0.75);
    }
  }

  shakeScreen();
  updateBattleUI();
  await wait(300);
}

// --- Do Ultimate ---
async function doUltimate(unit) {
  if (B.done) return;
  const enemies = unit.side === 'ally' ? B.et : B.pt;
  const allies = unit.side === 'ally' ? B.pt : B.et;
  const ult = unit.ult;
  if (!ult) { await doSkill(unit); return; }

  const stats = getEffectiveStats(unit);
  const color = ELEM_COLOR[unit.elem] || '#fff';

  // Buff type ultimate — ALWAYS buff entire team
  // Also handles dmg_buff: deal damage first, then buff
  if (ult.type === 'buff' || ult.type === 'dmg_buff') {
    // If dmg_buff, deal damage to enemies first
    if (ult.type === 'dmg_buff' && ult.mult > 0) {
      const isAoe = ult.aoe;
      const dmgTargets = isAoe ? enemies.filter(u => u.alive) : [pickTarget(enemies, allies)].filter(Boolean);
      const dmgMult = ult.mult || 1.5;
      for (const target of dmgTargets) {
        if (!target || !target.alive) continue;
        const targetEl = getUnitEl(target.id);
        const emTarget = elemMult(unit.elem, target.elem);
        let dmg = calcDmg(stats.atk, getEffectiveStats(target).def, dmgMult, emTarget, { skillDmgBonus: jobSkillDmgBonus(unit) + (unit.synSkillDmg || 0), synPen: unit.synPen || 0, synWindDmg: (unit.elem === '风') ? (unit.synWindDmg || 0) : 0 });
        var totalDmg = dmg;
        if (target.shield > 0) {
          if (dmg <= target.shield) { target.shield -= dmg; dmg = 0; }
          else { dmg -= target.shield; target.shield = 0; }
        }
        target.hp -= dmg;
        trackStat(unit.id, 'dmg', totalDmg);
        trackStat(target.id, 'taken', totalDmg);
        if (targetEl) { floatDmgAt(targetEl, dmg, true, false); targetEl.classList.add('hit'); setTimeout(() => targetEl.classList.remove('hit'), 300); }
        if (target.hp <= 0) { target.hp = 0; target.alive = false; }
        // Apply debuff from dmg_buff ult (goku burn, ichigo defDown etc.)
        if (ult.extra && ult.extra.debuff && target.alive) {
          applyDebuff(target, ult.extra.debuff, ult.extra.debuffRate || 0.5, unit, ult.extra.debuffValue);
        }
      }
      shakeScreen();
      await wait(300);
    }

    const buffStat = (ult.extra && ult.extra.stat) || 'atk';
    const buffPct = ((ult.extra && ult.extra.pct) || 0.5) * (1 + jobBuffBonus(unit));
    // +1 turn so the buff is effective for the listed number of ATTACK rounds
    const buffTurns = ((ult.extra && ult.extra.turns) || 3) + 1;
    const aliveAllies = allies.filter(u => u.alive);

    // Self-only extras: hpAdd (巨人化), counter (自在极意)
    if (ult.extra && ult.extra.hpAdd) { unit.maxHp += ult.extra.hpAdd; unit.hp += ult.extra.hpAdd; }
    if (ult.extra && ult.extra.counter) unit.counter = true;

    // Apply buff to ALL alive allies
    for (const a of aliveAllies) {
      a.buffs.push({ stat: buffStat, pct: buffPct, turns: buffTurns });
      if (ult.extra && ult.extra.stat2) {
        a.buffs.push({ stat: ult.extra.stat2, pct: (ult.extra.pct2 || 0.3) * (1 + jobBuffBonus(unit)), turns: buffTurns });
      }
      const aEl = getUnitEl(a.id);
      if (aEl) { showSkillBurst(aEl, color); showBuffParticles(aEl, color); }
    }

    // Heal on buff (五档尼卡, 虚空之神 etc.) — heals whole team
    if (ult.extra && ult.extra.heal === true) {
      const hAmt = Math.floor((2000 + stats.atk * 0.15) * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
      for (const a of aliveAllies) {
        let aH = hAmt;
        if (a.debuffs && a.debuffs.some(function(d) { return d.type === 'curse'; })) { aH = Math.floor(aH * 0.5); }
        a.hp = Math.min(a.maxHp, a.hp + aH);
        trackStat(unit.id, 'heal', aH);
        const aEl = getUnitEl(a.id);
        if (aEl) { floatDmgAt(aEl, aH, false, true); showHealAura(aEl); }
      }
    }
    // Shield on buff (梅林觉醒, 哆啦A梦觉醒) — each ally gets shield + 5% maxHp
    if (ult.extra && ult.extra.shield) {
      var buffShieldAmt = ult.extra.shield + Math.floor(unit.maxHp * 0.05);
      for (const a of aliveAllies) applyShield(a, buffShieldAmt);
    }

    const uEl = getUnitEl(unit.id);
    showFloatStatus(uEl, '全队强化!', true);
    shakeScreen();
    updateBattleUI();
    await wait(400);
    return;
  }

  // Heal type ultimate — scales with ATK: base + ATK*0.8 + jobHealBonus
  // If mult > 0, also deal damage to enemies first
  if (ult.type === 'heal') {
    // Deal damage if mult > 0
    if (ult.mult > 0) {
      const dmgTargets = enemies.filter(u => u.alive);
      for (const dt of dmgTargets) {
        if (!dt || !dt.alive) continue;
        const dtEl = getUnitEl(dt.id);
        const em = elemMult(unit.elem, dt.elem);
        const dtStats = getEffectiveStats(dt);
        let d = calcDmg(stats.atk, dtStats.def, ult.mult, em, { skillDmgBonus: jobSkillDmgBonus(unit) + (unit.synSkillDmg || 0), synPen: unit.synPen || 0, synWindDmg: (unit.elem === '风') ? (unit.synWindDmg || 0) : 0 });
        var totalD = d;
        if (dt.shield > 0) {
          if (d <= dt.shield) { dt.shield -= d; d = 0; }
          else { d -= dt.shield; dt.shield = 0; }
        }
        dt.hp -= d; trackStat(unit.id, 'dmg', totalD);
        trackStat(dt.id, 'taken', totalD);
        if (dtEl) { floatDmgAt(dtEl, totalD, false, false); showImpact(dtEl, color); dtEl.classList.add('hit'); setTimeout(() => dtEl.classList.remove('hit'), 300); }
        if (dt.hp <= 0) { dt.hp = 0; dt.alive = false; }
      }
      shakeScreen();
      await wait(300);
    }
    // Heal
    const baseHeal = (ult.extra && ult.extra.amt) ? ult.extra.amt : Math.floor(stats.atk * (ult.mult || 1.5));
    const atkScaling = Math.floor(stats.atk * 0.15);
    const healAmt = Math.floor((baseHeal + atkScaling) * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
    for (const t of allies.filter(u => u.alive)) {
      let tHeal = healAmt;
      if (t.debuffs && t.debuffs.some(function(d) { return d.type === 'curse'; })) { tHeal = Math.floor(tHeal * 0.5); }
      t.hp = Math.min(t.maxHp, t.hp + tHeal);
      trackStat(unit.id, 'heal', tHeal);
      const tEl = getUnitEl(t.id);
      if (tEl) { showHealAura(tEl); floatDmgAt(tEl, tHeal, false, true); }
    }
    // Cleanse
    if (ult.extra && ult.extra.cleanse) {
      for (const t of allies.filter(u => u.alive)) cleanse(t);
    }
    // Revive
    if (ult.extra && ult.extra.revive) {
      for (const t of allies.filter(u => !u.alive)) reviveUnit(t, 0.5);
    }
    // Buff from heal ult
    if (ult.extra && ult.extra.stat) {
      const bPct = (ult.extra.pct || 0.3) * (1 + jobBuffBonus(unit));
      for (const t of allies.filter(u => u.alive)) t.buffs.push({ stat: ult.extra.stat, pct: bPct, turns: ult.extra.turns || 3 });
    }
    // Debuff enemies from heal ult (giorno)
    if (ult.extra && ult.extra.debuff) {
      for (const e of enemies.filter(u => u.alive)) applyDebuff(e, ult.extra.debuff, ult.extra.debuffRate || 0.3, unit, ult.extra.debuffValue);
    }
    // Shield from heal ult (merlin, doraemon, spongebob awaken)
    if (ult.extra && ult.extra.shield) {
      var shieldVal = ult.extra.shield + Math.floor(unit.maxHp * 0.05);
      for (const a of allies.filter(u => u.alive)) applyShield(a, shieldVal);
    }
    shakeScreen();
    updateBattleUI();
    await wait(400);
    return;
  }

  // Shield type ultimate
  // If mult > 0, also deal damage to enemies first
  if (ult.type === 'shield') {
    // Shield = base amt + 10% of unit's maxHp for ultimate (stronger)
    const baseShield = (ult.extra && ult.extra.amt) ? ult.extra.amt : Math.floor(stats.def * 3);
    const shieldAmt = baseShield + Math.floor(unit.maxHp * 0.10);
    // Deal damage if mult > 0
    if (ult.mult > 0) {
      const dmgTargets = ult.aoe ? enemies.filter(u => u.alive) : [pickTarget(enemies, allies)].filter(Boolean);
      for (const dt of dmgTargets) {
        if (!dt || !dt.alive) continue;
        const dtEl = getUnitEl(dt.id);
        const em = elemMult(unit.elem, dt.elem);
        const dtStats = getEffectiveStats(dt);
        const d = calcDmg(stats.atk, dtStats.def, ult.mult, em, {});
        dt.hp -= d; trackStat(unit.id, 'dmg', d);
        if (dtEl) floatDmgAt(dtEl, d, false, false);
        if (dt.hp <= 0) { dt.hp = 0; dt.alive = false; }
      }
      await wait(300);
    }
    // Apply shield
    if (ult.aoe) {
      for (const a of allies.filter(u => u.alive)) applyShield(a, shieldAmt);
    } else {
      applyShield(unit, shieldAmt);
    }
    if (ult.extra && ult.extra.counter) unit.counter = true;
    shakeScreen();
    updateBattleUI();
    await wait(400);
    return;
  }

  // Damage ultimate
  const isAoe = ult.aoe;
  const targets = isAoe ? enemies.filter(u => u.alive) : [pickTarget(enemies, allies)].filter(Boolean);
  shakeScreen();

  const mult = ult.mult || 2;
  for (const target of targets) {
    if (!target || !target.alive) continue;
    const targetEl = getUnitEl(target.id);
    const emTarget = elemMult(unit.elem, target.elem);

    // Dodge check (ult can still be dodged but at half rate)
    if (target.dodge && Math.random() < target.dodge * 0.5) {
      if (targetEl) showFloatStatus(targetEl, '闪避!', false);
      continue;
    }

    let isCrit = false;
    let critMul = 1;
    let critRate = (ult.extra) ? (ult.extra.critBonus || 0) : 0;
    critRate += jobCritBonus(unit);
    critRate += (unit.synCrit || 0);
    if (critRate > 0 && Math.random() < critRate) { isCrit = true; critMul = 1.5 + jobCritDmgBonus(unit); }

    let dmg = calcDmg(stats.atk, getEffectiveStats(target).def, mult, emTarget, {
      ignoreDef: ult.extra && ult.extra.ignoreDef,
      vsDark: ult.extra && ult.extra.vsDark,
      targetElem: target.elem,
      skillDmgBonus: jobSkillDmgBonus(unit) + (unit.synSkillDmg || 0),
      synPen: unit.synPen || 0,
      synWindDmg: (unit.elem === '风') ? (unit.synWindDmg || 0) : 0
    });
    dmg = Math.floor(dmg * critMul);

    // Assassin execute: +50% damage when target below 30% HP
    if (getCharJob(unit) === '刺客' && target.hp < target.maxHp * 0.3) {
      dmg = Math.floor(dmg * 1.5);
    }

    var totalDmg = dmg;
    if (target.shield > 0) {
      if (dmg <= target.shield) { target.shield -= dmg; dmg = 0; }
      else { dmg -= target.shield; target.shield = 0; }
    }
    target.hp -= dmg;
    trackStat(unit.id, 'dmg', totalDmg);
    trackStat(target.id, 'taken', totalDmg);

    if (targetEl) {
      showSkillBurst(targetEl, color);
      floatDmgAt(targetEl, dmg, isCrit, false, false, false, true);
      shakeUnit(targetEl);
    }

    if (target.hp <= 0) { target.hp = 0; target.alive = false; }

    // Wake sleeping units on hit (ult)
    if (target.debuffs) {
      target.debuffs = target.debuffs.filter(function(d) {
        if (d.type === 'sleep') {
          showFloatStatus(targetEl || getUnitEl(target.id), '苏醒!', true);
          return false;
        }
        return true;
      });
    }

    // Warrior bonus: extra rage when hit
    if (target.alive && dmg > 0 && getCharJob(target) === '战士') {
      target.rage = Math.min(100, (target.rage || 0) + 10);
    }

    // Apply debuff from ult
    if (ult.extra && ult.extra.debuff && target.alive) {
      applyDebuff(target, ult.extra.debuff, ult.extra.debuffRate || 0.3, unit, ult.extra.debuffValue);
    }
    // Def down from ult (boolean extra.defDown)
    if (ult.extra && ult.extra.defDown === true && target.alive) {
      applyDebuff(target, 'defDown', 0.6, unit);
    }
  }

  // Heal from damage ult (link, jonathan replacements)
  if (ult.extra && typeof ult.extra.heal === 'number' && ult.extra.heal > 0) {
    const hAmt = Math.floor((ult.extra.heal + stats.atk * 0.15) * (1 + jobHealBonus(unit)) * (1 + (unit.synHeal || 0)));
    if (ult.aoe) {
      for (const a of allies.filter(u => u.alive)) {
        let aH = hAmt;
        if (a.debuffs && a.debuffs.some(function(d) { return d.type === 'curse'; })) { aH = Math.floor(aH * 0.5); }
        a.hp = Math.min(a.maxHp, a.hp + aH);
        trackStat(unit.id, 'heal', aH);
        const aEl = getUnitEl(a.id);
        if (aEl) { floatDmgAt(aEl, aH, false, true); showHealAura(aEl); }
      }
    } else {
      let selfH = hAmt;
      if (unit.debuffs && unit.debuffs.some(function(d) { return d.type === 'curse'; })) { selfH = Math.floor(selfH * 0.5); }
      unit.hp = Math.min(unit.maxHp, unit.hp + selfH);
      trackStat(unit.id, 'heal', selfH);
      const uEl = getUnitEl(unit.id);
      if (uEl) { floatDmgAt(uEl, hAmt, false, true); showHealAura(uEl); }
    }
  }
  // Shield from damage ult
  if (ult.extra && ult.extra.shield) {
    var aliveCount = Math.max(1, allies.filter(u=>u.alive).length);
    var shieldPerAlly = Math.floor((ult.extra.shield + unit.maxHp * 0.05) / aliveCount);
    for (const a of allies.filter(u => u.alive)) applyShield(a, shieldPerAlly);
  }
  // Buff from damage ult
  if (ult.extra && ult.extra.stat && ult.type === 'dmg') {
    const bPct = (ult.extra.pct || 0.3) * (1 + jobBuffBonus(unit));
    unit.buffs.push({ stat: ult.extra.stat, pct: bPct, turns: ult.extra.turns || 2 });
  }

  updateBattleUI();
  await wait(400);
}

// --- Battle End ---
function checkBattleEnd() {
  if (B.et.every(u => !u.alive)) { endBattle(true); return true; }
  if (B.pt.every(u => !u.alive)) { endBattle(false); return true; }
  return false;
}

function endBattle(won) {
  B.done = true;
  if (B._timer) { clearInterval(B._timer); B._timer = null; }
  if (B._bossTimerInterval) { clearInterval(B._bossTimerInterval); B._bossTimerInterval = null; }
  if (B._particleRAF) { cancelAnimationFrame(B._particleRAF); B._particleRAF = null; }
  // Clean up lingering float elements
  var field = getBField();
  if (field) {
    var floats = field.querySelectorAll('.float-dmg,.float-buff,.float-debuff,.heal-aura,.shield-pop,.buff-particle,.impact-ring,.slash-fx,.skill-burst');
    for (var fi = 0; fi < floats.length; fi++) floats[fi].remove();
  }

  let rewards = { exp: 0, gold: 0, gems: 0 };
  rewards.stats = {};
  for (var k in B.stats) {
    rewards.stats[k] = {dmg: B.stats[k].dmg || 0, heal: B.stats[k].heal || 0, taken: B.stats[k].taken || 0, cc: B.stats[k].cc || 0};
  }
  rewards.allyTeam = B.pt.map(u => ({ id: u.id.replace(/_e\d+$/, '').replace(/_a\d+$/, ''), name: u.name, img: u.img, rarity: u.rarity, alive: u.alive }));
  rewards.enemyTeam = B.et.map(u => ({ id: u.id, name: u.name, img: u.img, rarity: u.rarity, alive: u.alive }));
  if (won) {
    rewards.exp = 20 + G.stage * 10;
    rewards.gold = (50 + G.stage * 20) * 2;
    rewards.gems = (((G.stage - 1) % 10) + 1 === 5 || ((G.stage - 1) % 10) + 1 === 10) ? 200 : 100;

    const survivors = B.pt.filter(u => u.alive);

    // Arena handling
    if (G._fromArena) {
      const tier = getCurrentTier();
      G.arena.points = (G.arena.points || 0) + tier.winPts;
      G.arena.wins = (G.arena.wins || 0) + 1;
      rewards.gold = tier.gold;
      rewards.gems = tier.gems;
      rewards.exp = 0;
      G.gold += tier.gold;
      G.gems += tier.gems;
    } else if (G._fromBoss) {
      var totalDmg = 0;
      for (var i = 0; i < B.pt.length; i++) { var uid = B.pt[i].id; if (B.stats[uid] && B.stats[uid].dmg) totalDmg += B.stats[uid].dmg; }
      if (B._bossMaxHp) totalDmg = Math.min(totalDmg, B._bossMaxHp);
      G.boss.bestDmg = (G.boss.bestDmg || 0) + totalDmg;
      G.boss.lastSettleTime = Date.now(); // Prevent immediate settlement reset
      var tier = getBossDmgTier(G.boss.bestDmg);
      rewards.gold = Math.floor(tier.gold * 0.3);
      rewards.gems = Math.floor(tier.gems * 0.3);
      rewards.exp = 0;
      rewards._bossDmg = totalDmg;
      rewards._bossCumDmg = G.boss.bestDmg;
      G.gold += rewards.gold;
      G.gems += rewards.gems;
    } else {
      addTeamExp(rewards.exp);
      G.gold = (G.gold || 0) + rewards.gold;
      G.gems = (G.gems || 0) + rewards.gems;
    }
    G.wins = (G.wins || 0) + 1;

    rewards.survivors = survivors.map(u => u.id.replace(/_e\d+$/, '').replace(/_a\d+$/, ''));
    rewards.turns = B.turn;
  } else {
    G.losses = (G.losses || 0) + 1;
    if (G._fromArena) {
      G.arena.losses = (G.arena.losses || 0) + 1;
      const tier = getCurrentTier();
      rewards.gold = Math.floor(tier.gold * 0.3);
      rewards.gems = Math.floor(tier.gems * 0.3);
      rewards.exp = 0;
      G.gold += rewards.gold;
      G.gems += rewards.gems;
    } else if (G._fromBoss) {
      var totalDmg = 0;
      for (var i = 0; i < B.pt.length; i++) { var uid = B.pt[i].id; if (B.stats[uid] && B.stats[uid].dmg) totalDmg += B.stats[uid].dmg; }
      if (B._bossMaxHp) totalDmg = Math.min(totalDmg, B._bossMaxHp);
      G.boss.bestDmg = (G.boss.bestDmg || 0) + totalDmg;
      G.boss.lastSettleTime = Date.now(); // Prevent immediate settlement reset
      var tier = getBossDmgTier(G.boss.bestDmg);
      rewards.gold = Math.floor(tier.gold * 0.1);
      rewards.gems = Math.floor(tier.gems * 0.1);
      rewards.exp = 0;
      rewards._bossDmg = totalDmg;
      rewards._bossCumDmg = G.boss.bestDmg;
      G.gold += rewards.gold;
      G.gems += rewards.gems;
    } else {
      // 10% failure rewards for PvE
      rewards.exp = Math.floor((20 + G.stage * 10) * 0.1);
      rewards.gold = Math.floor((50 + G.stage * 20) * 2 * 0.1);
      rewards.gems = 5;
      addTeamExp(rewards.exp);
      G.gold += rewards.gold;
      G.gems += rewards.gems;
    }
    rewards.survivors = [];
    rewards.turns = B.turn;
  }

  // Advance stage on PvE win (always, regardless of auto-next)
  if (won && !G._fromArena && !G._fromBoss) {
    G.stage++;
  }

  saveGame();
  // Auto-next: if won and autoNext enabled, skip result screen and go directly to next battle
  if (G.autoNext && won && !G._fromArena && !G._fromBoss) {
    // Show brief victory flash then start next battle
    const field = getBField();
    if (field) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);';
      overlay.innerHTML = '<div style="font-size:1.5rem;color:var(--gold);font-family:var(--title);text-shadow:0 0 20px rgba(255,215,0,0.5);">胜利! 进入下一关...</div>';
      field.appendChild(overlay);
    }
    B._autoNextTimer = setTimeout(() => {
      B._autoNextTimer = null;
      startBattle();
    }, 800);
    return;
  }
  // Arena auto-next: if arenaAutoNext enabled and from arena, auto-start next match (stop on loss)
  if (G.arenaAutoNext && won && G._fromArena) {
    var arenaRemain = 50 - (G.arena.dailyBattles || 0);
    if (arenaRemain > 0) {
      const field = getBField();
      if (field) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);';
        overlay.innerHTML = '<div style="text-align:center"><div style="font-size:1.5rem;color:'+(won?'var(--gold)':'#ff6b6b')+';font-family:var(--title);text-shadow:0 0 20px rgba(255,215,0,0.5);">'+(won?'胜利!':'失败...')+'</div><div style="font-size:0.5rem;color:var(--dim);margin-top:4px">自动下一场 (剩余'+arenaRemain+'次)</div></div>';
        field.appendChild(overlay);
      }
      // Clear arena flag so startArenaBattle sets it fresh
      delete G._fromArena;
      delete G._arenaOpp;
      B._autoNextTimer = setTimeout(() => {
        B._autoNextTimer = null;
        startArenaBattle();
      }, 800);
      return;
    }
  }
  setTimeout(() => { show('result'); renderResult(won, rewards); }, 1000);
}

// --- Particle System ---
function initParticles() {
  const cvs = document.getElementById('b-particles');
  if (!cvs || !cvs.getContext) return;
  cvs.width = cvs.parentElement.clientWidth || 360;
  cvs.height = cvs.parentElement.clientHeight || 600;
  particles = Array.from({ length: 35 }, () => ({
    x: Math.random() * cvs.width, y: Math.random() * cvs.height,
    r: Math.random() * 1.5 + 0.3, dx: (Math.random() - 0.5) * 0.3,
    dy: -Math.random() * 0.4 - 0.1, o: Math.random() * 0.5 + 0.1
  }));
  drawParticles();
}

function drawParticles() {
  if (B.done || !document.getElementById('b-particles')) { B._particleRAF = null; return; }
  const cvs = document.getElementById('b-particles');
  if (!cvs || !cvs.getContext) { B._particleRAF = null; return; }
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  for (const p of particles) {
    p.x += p.dx; p.y += p.dy;
    if (p.y < -5) { p.y = cvs.height + 5; p.x = Math.random() * cvs.width; }
    if (p.x < -5) p.x = cvs.width + 5;
    if (p.x > cvs.width + 5) p.x = -5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${p.o})`; ctx.fill();
  }
  B._particleRAF = requestAnimationFrame(drawParticles);
}

const ARENA_MILESTONES = [
  { battles: 5, gold: 1000, gems: 80 },
  { battles: 10, gold: 2000, gems: 150 },
  { battles: 20, gold: 4000, gems: 250 },
  { battles: 30, gold: 6000, gems: 350 },

];

function initArenaSeason() {
  const now = Date.now();
  if (!G.arena) G.arena = { points: 0, season: 1, seasonEnd: 0, dailyClaimed: 0, wins: 0, losses: 0, dailyBattles: 0, dailyBattleDate: 0, milestonesClaimed: [] };
  // Reset daily battles if day changed (local time)
  var _d = new Date();
  const today = _d.getFullYear() * 10000 + (_d.getMonth()+1) * 100 + _d.getDate();
  if (G.arena.dailyBattleDate !== today) {
    G.arena.dailyBattles = 0;
    G.arena.dailyBattleDate = today;
    G.arena.milestonesClaimed = [];
  }
  if (!G.arena.seasonEnd || now >= G.arena.seasonEnd) {
    if (G.arena.seasonEnd && G.arena.points > 0) {
      var bestTier = ARENA_TIERS[0];
      for (var ti = ARENA_TIERS.length - 1; ti >= 0; ti--) {
        if (G.arena.points >= ARENA_TIERS[ti].threshold) { bestTier = ARENA_TIERS[ti]; break; }
      }
      G.gold += bestTier.seasonReward.gold;
      G.gems += bestTier.seasonReward.gems;
    }
    G.arena.season = (G.arena.season || 0) + 1;
    G.arena.seasonEnd = getNextMondayMidnight();
    G.arena.points = 0;
    G.arena.dailyClaimed = 0;
    G.arena.wins = 0;
    G.arena.losses = 0;
    saveGame();
  }
}

function generateArenaOpponent() {
  const tier = getCurrentTier();
  const teamSize = tier.teamSize;
  const rng = seededRandom(Date.now());

  // 60% chance to use a preset synergy team
  if (rng() < 0.6) {
    var preset = getPresetTeamForSize(teamSize, rng);
    if (preset) {
      return { preset: preset.name, team: preset.members.map(function(id) {
        var minStar = Math.max(0, tier.starMax - 2);
        var star = minStar + Math.floor(rng() * (tier.starMax - minStar + 1));
        var minEquip = Math.max(0, tier.equipMax - 3);
        var equipLv = minEquip + Math.floor(rng() * (tier.equipMax - minEquip + 1));
        return { id: id, star: star, equipLv: equipLv };
      })};
    }
  }

  // Fallback: random team
  const ssrPool2 = CHARS.filter(c => c.rarity === 'SSR');
  const ssPool2 = CHARS.filter(c => c.rarity === 'SS');
  const srPool2 = CHARS.filter(c => c.rarity === 'SR');
  const team = [];
  const usedIds2 = {};
  for (let i = 0; i < teamSize; i++) {
    let pool;
    if (rng() < tier.ssrChance) pool = ssrPool2;
    else if (rng() < 0.5) pool = ssPool2.length ? ssPool2 : srPool2;
    else pool = srPool2;
    let c, attempts = 0;
    do { c = pool[Math.floor(rng() * pool.length)]; attempts++; } while (usedIds2[c.id] && attempts < 30);
    usedIds2[c.id] = true;
    const star = Math.floor(rng() * (tier.starMax + 1));
    const equipLv = Math.floor(rng() * (tier.equipMax + 1));
    team.push({ id: c.id, star: star, equipLv: equipLv });
  }
  return { preset: null, team: team };
}

function getCodexBonusFromState(state) {
  var roster = (state && state.roster) ? state.roster : {};
  var ownedCount = 0;
  var totalStars = 0;
  var rarityCount = {SR:0, SS:0, SSR:0};
  for (var id in roster) {
    ownedCount++;
    var star = roster[id] && roster[id].star ? roster[id].star : 0;
    totalStars += star;
    var ch = CHARS.find(function(c){ return c.id === id; });
    if (ch && rarityCount[ch.rarity] !== undefined) rarityCount[ch.rarity]++;
  }
  var pct = ownedCount * 0.003 + totalStars * 0.0005 + rarityCount.SS * 0.0015 + rarityCount.SSR * 0.0035;
  pct = Math.min(pct, 0.5);
  return { pct: pct };
}

function getCharStatsFromState(state, charId) {
  var c = CHARS.find(function(ch) { return ch.id === charId; });
  var roster = state && state.roster ? state.roster : {};
  var r = roster[charId];
  if (!c || !r) return null;
  var teamLv = Number(state.teamLv || 1);
  var rebirth = Number(state.rebirth || 0);
  var lvMult = 1 + (teamLv - 1) * 0.06;
  var sMult = starStatMult(r.star || 0);
  var rebirthMult = 1 + rebirth * 0.3;
  var codexMult = 1 + getCodexBonusFromState(state).pct;
  var eb = {atk:0, def:0, hp:0, spd:0};
  var equip = r.equip || {};
  for (var i = 0; i < EQUIP_TYPES.length; i++) {
    var eq = EQUIP_TYPES[i];
    var b = equipBonus(eq.id, Number(equip[eq.id] || 0), Number(r.equipBreak || 0));
    for (var k in b) eb[k] += b[k];
  }
  var jobBonus = {hp:0, atk:0, def:0, spd:0};
  var job = c.job || '输出';
  var baseHp = c.hp * HP_SCALE * lvMult * sMult * rebirthMult;
  var baseAtk = c.atk * lvMult * sMult * rebirthMult;
  var baseDef = c.def * lvMult * sMult * rebirthMult;
  var baseSpd = c.spd * lvMult * sMult * rebirthMult;
  if (job === '坦克') { jobBonus.hp = baseHp * 0.15; jobBonus.def = baseDef * 0.20; }
  else if (job === '战士') { jobBonus.atk = baseAtk * 0.15; jobBonus.spd = baseSpd * 0.10; }
  else if (job === '法师') { jobBonus.atk = baseAtk * 0.15; }
  else if (job === '刺客') { jobBonus.atk = baseAtk * 0.10; jobBonus.spd = baseSpd * 0.15; }
  else if (job === '辅助') { jobBonus.hp = baseHp * 0.10; jobBonus.atk = baseAtk * 0.10; jobBonus.def = baseDef * 0.10; jobBonus.spd = baseSpd * 0.10; }
  return {
    hp: Math.floor((baseHp + eb.hp + jobBonus.hp) * codexMult),
    atk: Math.floor((baseAtk + eb.atk + jobBonus.atk) * codexMult),
    def: Math.floor((baseDef + eb.def + jobBonus.def) * codexMult),
    spd: Math.floor((baseSpd + eb.spd + jobBonus.spd) * codexMult)
  };
}

function buildArenaStateFromPlayer(opponent) {
  var roster = {};
  var sourceRoster = opponent && opponent.roster ? opponent.roster : {};
  for (var id in sourceRoster) {
    var src = sourceRoster[id] || {};
    roster[id] = {
      star: Number(src.star || 0),
      frags: Number(src.frags || 0),
      equip: {
        weapon: Number(src.equip && src.equip.weapon || 0),
        armor: Number(src.equip && src.equip.armor || 0),
        accessory: Number(src.equip && src.equip.accessory || 0)
      },
      equipBreak: Number(src.equipBreak || 0)
    };
  }
  return {
    roster: roster,
    formation: Array.isArray(opponent && opponent.formation) ? opponent.formation.filter(Boolean).slice(0, 6) : [],
    teamLv: Number(opponent && opponent.teamLv || 1),
    rebirth: Number(opponent && opponent.rebirth || 0)
  };
}

function buildArenaUnitsFromPlayer(opponent) {
  var state = buildArenaStateFromPlayer(opponent);
  var formation = state.formation.filter(function(id) { return state.roster[id]; });
  return formation.map(function(charId, i) {
    var c = CHARS.find(function(ch) { return ch.id === charId; });
    var stats = getCharStatsFromState(state, charId);
    if (!c || !stats) return null;
    var star = Number(state.roster[charId].star || 0);
    var job = c.job || '输出';
    return {
      id: c.id + '_p' + i,
      name: c.name,
      elem: c.elem,
      rarity: c.rarity,
      img: c.img,
      side: 'foe',
      job: job,
      maxHp: stats.hp,
      hp: stats.hp,
      atk: stats.atk,
      def: stats.def,
      spd: stats.spd,
      skill: c.skill,
      ult: star >= 7 ? c.awakenSkill : c.ult,
      rage: 0,
      alive: true,
      buffs: [],
      debuffs: [],
      shield: 0,
      taunt: 0,
      counter: false,
      row: i < 3 ? 'front' : 'back'
    };
  }).filter(Boolean);
}

function claimArenaMilestone(index) {
  const a = G.arena;
  if (!a.milestonesClaimed) a.milestonesClaimed = [];
  if (a.milestonesClaimed.indexOf(index) !== -1) return;
  const m = ARENA_MILESTONES[index];
  if (!m) return;
  if ((a.dailyBattles || 0) < m.battles) return;
  G.gold += m.gold;
  G.gems += m.gems;
  a.milestonesClaimed.push(index);
  saveGame();
  renderHub('arena');
}

async function startArenaBattle(targetRoleId) {
  const formChars = G.formation.filter(Boolean);
  if (!formChars.length) { gameToast('提示', '请先在阵容页面编入角色！'); return; }

  // Daily battle limit (local time)
  var now = Date.now();
  var _d2 = new Date();
  var today = _d2.getFullYear() * 10000 + (_d2.getMonth()+1) * 100 + _d2.getDate();
  if (G.arena.dailyBattleDate !== today) {
    G.arena.dailyBattles = 0;
    G.arena.dailyBattleDate = today;
    G.arena.milestonesClaimed = [];
  }
  if (G.arena.dailyBattles >= 50) {
    gameToast('提示', '今日对战次数已用完(50/50)');
    return;
  }

  G._fromArena = true;
  const tier = getCurrentTier();
  var matchedPlayer = null;
  if (ONLINE.token && ONLINE.selectedRoleId) {
    var opponents = ONLINE.arenaOpponents;
    if (!opponents || !opponents.length || targetRoleId) {
      opponents = await loadArenaOpponents(!!targetRoleId);
    }
    if (opponents && opponents.length) {
      if (targetRoleId) {
        for (var oi = 0; oi < opponents.length; oi++) {
          if (Number(opponents[oi].id) === Number(targetRoleId)) {
            matchedPlayer = opponents[oi];
            break;
          }
        }
      }
      if (!matchedPlayer) {
        matchedPlayer = opponents[Math.floor(Math.random() * opponents.length)];
      }
    }
  }

  var oppResult = matchedPlayer ? { preset: null, team: [] } : generateArenaOpponent();
  var oppTeam = oppResult.team;
  var enemyCharIds = [];

  G.arena.dailyBattles++;
  saveGame();

  B = { pt:[], et:[], done:false, turn:0, activeSyn:[], enemySyn:[], _actingUnit:null, _timer:null, speed: G.battleSpeed || 1, paused:false, stats:{} };

  B.pt = formChars.map(function(charId, i) {
    var c = CHARS.find(function(ch) { return ch.id === charId; });
    if (!c) return null;
    var st = getCharStats(charId);
    var job = c.job || '输出';
    var u = {
      id: charId, name: c.name, elem: c.elem, rarity: c.rarity,
      img: c.img, side: 'ally', job: job,
      maxHp: st.hp, hp: st.hp, atk: st.atk, def: st.def, spd: st.spd,
      skill: c.skill, ult: getActiveSkill(charId),
      rage: 0, alive: true, buffs: [], debuffs: [], shield: 0,
      taunt: 0, counter: false,
      row: i < 3 ? 'front' : 'back'
    };
    if (job === '坦克') u.taunt = 3;
    return u;
  }).filter(Boolean);

  if (matchedPlayer) {
    B.et = buildArenaUnitsFromPlayer(matchedPlayer);
    enemyCharIds = buildArenaStateFromPlayer(matchedPlayer).formation.filter(Boolean);
    G._arenaOpp = { type: 'player', roleName: matchedPlayer.roleName, serverName: matchedPlayer.serverName };
  } else {
    B.et = oppTeam.map(function(t, i) {
      var c = CHARS.find(function(ch) { return ch.id === t.id; });
      if (!c) return null;
      var starMult = 1 + (t.star || 0) * 0.5;
      var lvMult = 1 + (G.teamLv - 1) * 0.06;
      var equipBon = (t.equipLv || 0) * 0.03;
      var sc = tier.mult * lvMult * starMult * (1 + equipBon);
      var job = c.job || '输出';
      return {
        id: c.id + '_a' + i, name: c.name, elem: c.elem, rarity: c.rarity,
        img: c.img, side: 'foe', job: job,
        maxHp: Math.floor(c.hp * HP_SCALE * sc), hp: Math.floor(c.hp * HP_SCALE * sc),
        atk: Math.floor(c.atk * sc), def: Math.floor(c.def * sc),
        spd: Math.floor(c.spd * sc),
        skill: c.skill, ult: (t.star >= 7) ? c.awakenSkill : c.ult,
        rage: 0, alive: true, buffs: [], debuffs: [], shield: 0,
        taunt: 0, counter: false,
        row: i < 3 ? 'front' : 'back'
      };
    }).filter(Boolean);
    enemyCharIds = oppTeam.map(function(t) { return t.id; });
    delete G._arenaOpp;
  }

  B.activeSyn = applySynergies(B.pt);

  // Apply synergies to enemy team too
  // Show enemy synergies (display only, no stat bonus)
  var enemySynList = calcSynergies(enemyCharIds);
  if (enemySynList.length) {
    B.enemySyn = enemySynList.map(function(s) { return s.name; });
  }

  show('battle');
  renderBattleField();
  showBattleStart();
  setTimeout(function() { if (!B.done) runBattleLoop(); }, 1200 / B.speed);
}

function collectIdleRewards() {
  if (!G.idle) G.idle = { lastCollect: Date.now() };
  var idleSecs = Math.min(Math.floor((Date.now() - G.idle.lastCollect) / 1000), 8 * 3600);
  if (idleSecs < 60) return;
  var stageGoldBase = (50 + G.stage * 20) * 2;
  var stageExpBase = 20 + G.stage * 10;
  var stageGemsBase = 50;
  var gold = Math.floor(stageGoldBase * 0.02 * idleSecs);
  var exp = Math.floor(stageExpBase * 0.01 * idleSecs);
  var gems = Math.floor(stageGemsBase / 180 * idleSecs);
  G.gold += gold;
  G.gems += gems;
  addTeamExp(exp);
  G.idle.lastCollect = Date.now();
  saveGame();
  gameToast('挂机收益', '💰 ' + gold.toLocaleString() + ' 金币\n⭐ ' + exp + ' EXP\n💎 ' + gems + ' 钻石');
  renderHub('battle');
}

function bonusText(bonus) {
  var parts = [];
  var labels = {atk:'攻击力', def:'防御力', spd:'速度', hp:'生命值', all:'全属性', crit:'暴击率', skillDmg:'技能伤害', penetration:'穿透', shield:'护盾', heal:'治疗效果', windDmg:'风属性伤害'};
  if (bonus.type) parts.push((labels[bonus.type]||bonus.type) + '+' + Math.round(bonus.value*100) + '%');
  if (bonus.type2) parts.push((labels[bonus.type2]||bonus.type2) + '+' + Math.round(bonus.value2*100) + '%');
  return parts.join('，');
}

function showSynDetail(synId) {
  var syn = SYNERGIES.find(function(s) { return s.id === synId; });
  if (!syn) return;
  var ownedIds = Object.keys(G.roster);
  var formIds = G.formation.filter(Boolean);

  var memberIds = [];
  if (Array.isArray(syn.members)) {
    if (Array.isArray(syn.members[0])) {
      for (var p of syn.members) { for (var m of p) { if (memberIds.indexOf(m)===-1) memberIds.push(m); } }
    } else { memberIds = syn.members; }
  } else if (syn.members && syn.members.required) {
    memberIds = syn.members.required.concat(syn.members.any || []);
  }

  var membersHtml = '';
  for (var i = 0; i < memberIds.length; i++) {
    var mid = memberIds[i];
    var c = CHARS.find(function(ch){return ch.id===mid;});
    if (!c) continue;
    var inForm = formIds.indexOf(mid) >= 0;
    var owned = ownedIds.indexOf(mid) >= 0;
    var cls = inForm ? 'in-form' : owned ? 'owned' : 'missing';
    var label = inForm ? '已上阵' : owned ? '已拥有' : '未拥有';
    var labelColor = inForm ? '#22c55e' : owned ? 'var(--gold)' : 'var(--dim)';
    membersHtml += '<div class="syn-detail-member ' + cls + '">' +

function renderSynergyTab() {
  var ownedIds = Object.keys(G.roster);
  var formIds = G.formation.filter(Boolean);

  // Check which synergies are active with current formation
  function isSynActive(syn) {
    if (syn.matchType === 'elem') {
      var count = 0;
      for (var f of formIds) { var c = CHARS.find(ch=>ch.id===f); if (c && c.elem === syn.elem) count++; }
      return count >= syn.need;
    }
    if (syn.matchType === 'all') { return syn.members.every(m => formIds.includes(m)); }
    if (syn.matchType === 'any') {
      var count = 0;
      var mems = Array.isArray(syn.members) ? syn.members : [];
      for (var m of mems) { if (formIds.includes(m)) count++; }
      return count >= syn.need;
    }
    return false;
  }

  // Sort: active first, then by need count
  var sorted = SYNERGIES.slice().sort(function(a,b) {
    var aA = isSynActive(a) ? 0 : 1;
    var bA = isSynActive(b) ? 0 : 1;
    if (aA !== bA) return aA - bA;
    return a.need - b.need;
  });

  var activeCount = sorted.filter(function(s){ return isSynActive(s); }).length;

  var html = '<div class="syn-page">';
  html += '<div style="text-align:center;margin-bottom:0.2rem">' +
    '<div style="font-size:0.55rem;font-weight:800;color:var(--accent)">羁绊系统</div>' +
    '<div style="font-size:0.35rem;color:var(--dim);margin-top:2px">阵容中激活羁绊可获得额外属性加成</div>' +
    '<div style="font-size:0.4rem;color:#22c55e;margin-top:4px;font-weight:700">当前激活: ' + activeCount + '/' + SYNERGIES.length + '</div>' +
  '</div>';

  for (var s of sorted) {
    var active = isSynActive(s);
    // Get member list
    var memberIds = [];
    if (Array.isArray(s.members)) {
      if (Array.isArray(s.members[0])) {
        // pairs type
        for (var p of s.members) { for (var m of p) { if (memberIds.indexOf(m)===-1) memberIds.push(m); } }
      } else {
        memberIds = s.members;
      }
    } else if (s.members && s.members.required) {
      memberIds = s.members.required.concat(s.members.any || []);
    }

    var membersHtml = '';
    for (var mid of memberIds) {
      var c = CHARS.find(function(ch){return ch.id===mid;});
      if (!c) continue;
      var owned = ownedIds.indexOf(mid) >= 0;
      var inForm = formIds.indexOf(mid) >= 0;
      var mCls = 'syn-member' + (owned ? ' owned' : ' missing');
      var border = inForm ? 'border:1px solid #22c55e' : owned ? '' : 'border:1px solid rgba(255,255,255,0.05)';
      membersHtml += '<span class="' + mCls + '"' + (border ? ' style="' + border + '"' : '') + '>' +
        '<img src="' + c.img + '">' + c.name +
        (inForm ? ' ✓' : !owned ? ' ?' : '') +
      '</span>';
    }

    html += '<div class="syn-card' + (active ? ' active' : '') + '">' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
        '<span class="syn-card-name">' + (active ? '✅ ' : '') + s.name + '</span>' +
        '<span style="font-size:0.33rem;color:' + (active ? '#22c55e' : 'var(--dim)') + ';font-weight:600;padding:2px 8px;border-radius:4px;background:' + (active ? 'rgba(34,197,94,0.1)' : 'rgba(255,255,255,0.03)') + '">' + (active ? '已激活' : '需' + s.need + '人') + '</span>' +
      '</div>' +
      '<div class="syn-card-desc">' + s.desc + '</div>' +
      '<div class="syn-card-bonus">效果: ' + bonusText(s.bonus) + '</div>' +
      '<div class="syn-card-members">' + membersHtml + '</div>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

const BOSS_DMG_TIERS = [
  { dmg: 0, gold: 80000, gems: 500, label: '初级' },
  { dmg: 500000, gold: 150000, gems: 1000, label: '中级' },
  { dmg: 2000000, gold: 250000, gems: 1800, label: '高级' },
  { dmg: 8000000, gold: 400000, gems: 3000, label: '精英' },
  { dmg: 30000000, gold: 600000, gems: 4500, label: '大师' },
  { dmg: 100000000, gold: 900000, gems: 7000, label: '宗师' },
  { dmg: 500000000, gold: 1300000, gems: 10000, label: '传说' },
  { dmg: 2000000000, gold: 1800000, gems: 15000, label: '神话' },
  { dmg: 10000000000, gold: 2500000, gems: 22000, label: '超越' }
];

function getNextSettleTime() {
  const now = new Date();
  const h = now.getHours();
  const next = new Date(now);
  next.setMinutes(0, 0, 0);
  if (h < 12) next.setHours(12);
  else { next.setDate(next.getDate() + 1); next.setHours(0); }
  return next.getTime();
}

function checkBossSettle() {
  var now = Date.now();
  var b = G.boss;
  var d = new Date(now);
  var h = d.getHours();
  var boundary = new Date(d);
  boundary.setMinutes(0, 0, 0);
  boundary.setHours(h >= 12 ? 12 : 0);
  var bMs = boundary.getTime();
  if (b.lastSettleTime < bMs && b.bestDmg > 0) {
    var tier = getBossDmgTier(b.bestDmg);
    G.gold += tier.gold;
    G.gems += tier.gems;
    b.totalRewards += tier.gold;
    b.lastSettleTime = now;
    b.bestDmg = 0;
    saveGame();
    gameToast('BOSS结算', '💰 ' + tier.gold.toLocaleString() + ' 金币\n💎 ' + tier.gems + ' 钻石\n(累计伤害 ' + tier.label + ' 档)');
  }
  // Reset attempts every 12h period (matching settlement at 0:00 and 12:00)
  var pd = new Date(now);
  var periodId = (pd.getFullYear() * 10000 + (pd.getMonth()+1) * 100 + pd.getDate()) * 10 + (pd.getHours() >= 12 ? 1 : 0);
  if (b.todayDate !== periodId) {
    b.todayAttempts = 0;
    b.todayDate = periodId;
  }
}

function getBossChar() {
  const ssrPool = CHARS.filter(c => c.rarity === 'SSR');
  const weekIdx = Math.floor(Date.now() / (7*24*60*60*1000));
  return ssrPool[weekIdx % ssrPool.length];
}

function getBossDmgTier(dmg) {
  var tier = BOSS_DMG_TIERS[0];
  for (var i = BOSS_DMG_TIERS.length - 1; i >= 0; i--) {
    if (dmg >= BOSS_DMG_TIERS[i].dmg) { tier = BOSS_DMG_TIERS[i]; break; }
  }
  return tier;
}

function getNextSettleTime() {
  var now = new Date();
  var h = now.getHours();
  var next = new Date(now);
  next.setMinutes(0, 0, 0);
  if (h < 12) { next.setHours(12); }
  else { next.setDate(next.getDate() + 1); next.setHours(0); }
  return next.getTime();
}

function formatCountdown(ms) {
  if (ms <= 0) return '结算中...';
  var h = Math.floor(ms / 3600000);
  var m = Math.floor((ms % 3600000) / 60000);
  return h + '时' + m + '分';
}

      '<div>' +
        '<div style="font-size:0.38rem;color:var(--dim)">本期累计伤害</div>' +
        '<div style="font-size:0.65rem;font-weight:900;color:#ff4444">' + (b.bestDmg || 0).toLocaleString() + '</div>' +

  if (!formChars.length) { gameToast('提示', '请先在阵容页面编入角色！'); return; }

  const b = G.boss;
  const pd = new Date();
  const periodId = (pd.getFullYear() * 10000 + (pd.getMonth()+1) * 100 + pd.getDate()) * 10 + (pd.getHours() >= 12 ? 1 : 0);
  if (b.todayDate !== periodId) { b.todayAttempts = 0; b.todayDate = periodId; }
  if (b.todayAttempts >= 5) { gameToast('提示', '本期挑战次数已用完(5/5)，下次结算后刷新！'); return; }
  b.todayAttempts++;
  saveGame();

  G._fromBoss = true;
  var bossChar = getBossChar();
  var rebirthScale = 1 + (G.rebirth || 0) * 0.3;
  var baseHP = (5000000 + (G.teamLv || 1) * 500000) * rebirthScale * 3;
  var BOSS_HP = Math.floor(baseHP);

  B = { pt:[], et:[], done:false, turn:0, activeSyn:[], enemySyn:[], _actingUnit:null, _timer:null, speed: G.battleSpeed || 1, paused:false, stats:{} };  B._bossMaxHp = BOSS_HP;

  B.pt = formChars.map(function(charId, i) {
    var c = CHARS.find(function(ch) { return ch.id === charId; });
    if (!c) return null;
    var st = getCharStats(charId);
    var job = c.job || '输出';
    var u = {
      id: charId, name: c.name, elem: c.elem, rarity: c.rarity,
      img: c.img, side: 'ally', job: job,
      maxHp: st.hp, hp: st.hp, atk: st.atk, def: st.def, spd: st.spd,
      skill: c.skill, ult: getActiveSkill(charId),
      rage: 0, alive: true, buffs: [], debuffs: [], shield: 0,
      taunt: 0, counter: false,
      row: i < 3 ? 'front' : 'back'
    };
    if (job === '坦克') u.taunt = 3;
    return u;
  }).filter(Boolean);

  B.et = [{
    id: 'boss_0', name: '【BOSS】' + bossChar.name, elem: bossChar.elem, rarity: 'SSR',
    img: bossChar.img, side: 'foe', job: '坦克',
    maxHp: BOSS_HP, hp: BOSS_HP,
    atk: Math.floor(bossChar.atk * 4.0), def: Math.floor(bossChar.def * 3.5),
    spd: Math.floor(bossChar.spd * 0.9),
    skill: bossChar.skill, ult: bossChar.awakenSkill || bossChar.ult,
    rage: 0, alive: true, buffs: [], debuffs: [], shield: 0,
    taunt: 0, counter: false, row: 'front'
  }];

  B.activeSyn = applySynergies(B.pt);
  show('battle');
  renderBattleField();
  showBattleStart();
  // Start 10-minute boss timer (affected by battle speed)
  B._bossTimeLeft = 600;
  B._bossAtkStacks = 0;
  B._bossTimerInterval = setInterval(function() {
    if (B.done) { clearInterval(B._bossTimerInterval); return; }
    B._bossTimeLeft--;
    var el = document.getElementById('boss-timer');
    if (el) {
      var m = Math.floor(B._bossTimeLeft / 60);
      var s = B._bossTimeLeft % 60;
      el.textContent = '\u23F1 ' + m + ':' + (s < 10 ? '0' : '') + s;
      if (B._bossTimeLeft <= 60) el.style.color = '#ff2222';
    }
    // Every 60 ticks (1 min of game-time), boss gets +10% ATK
    if (B._bossTimeLeft > 0 && B._bossTimeLeft % 60 === 0) {
      B._bossAtkStacks++;
      var boss = B.et[0];
      if (boss && boss.alive) {
        boss.atk = Math.floor(boss.atk * 1.15);
        var bEl = getUnitEl(boss.id);
        if (bEl) showFloatStatus(bEl, '\u72C2\u66B4+' + (B._bossAtkStacks * 15) + '%', true);
      }
    }
    if (B._bossTimeLeft <= 0) {
      clearInterval(B._bossTimerInterval);
      if (!B.done) endBattle(false);
    }
  }, Math.max(1000 / (B.speed || 1), B.speed >= 5 ? 200 : 333));
  setTimeout(function() { if (!B.done) runBattleLoop(); }, 1200 / B.speed);
}

// --- Initialization ---
async function init() {
  await fetchOnlineProfile();
  renderTitle();
}

// Auto-start
init();
</script>
