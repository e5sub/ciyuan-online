services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_OWNER:-local}/${GITHUB_IMAGE:-dimension-brawl}:local
    container_name: dimension-brawl-app
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-dimension_brawl}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "4000:4000"